<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Multijoueur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .poker-table {
            background: radial-gradient(circle, #2d7a3f 0%, #174220 100%);
            border: 12px solid #5c3a21;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .card {
            background-color: white;
            border-radius: 0.25rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            position: relative;
        }
        .card.red { color: #dc2626; }
        .card.black { color: #171717; }
        .card-back {
            background: repeating-linear-gradient(45deg, #1e3a8a, #1e3a8a 10px, #1e40af 10px, #1e40af 20px);
            border: 2px solid white;
        }
        .player-seat {
            transition: all 0.3s;
        }
        .active-turn {
            box-shadow: 0 0 15px 5px #fbbf24;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-stone-900 text-white min-h-screen font-sans">

    <!-- Écran d'accueil -->
    <div id="home-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-stone-800 p-8 rounded-xl shadow-2xl max-w-md w-full border border-stone-700">
            <h1 class="text-4xl font-bold text-center text-green-500 mb-8">Texas Hold'em</h1>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-stone-400 mb-2">Votre Pseudo</label>
                    <input type="text" id="player-name" class="w-full bg-stone-900 border border-stone-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500" placeholder="Ex: Yooni...">
                </div>

                <div class="pt-4 border-t border-stone-700">
                    <button id="btn-create" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-lg transition mb-4">
                        Créer une Table (Hôte)
                    </button>
                    
                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-stone-600"></div>
                        <span class="flex-shrink-0 mx-4 text-stone-500 text-sm">OU</span>
                        <div class="flex-grow border-t border-stone-600"></div>
                    </div>

                    <div class="flex gap-2 mt-4">
                        <input type="text" id="join-game-id" class="w-2/3 bg-stone-900 border border-stone-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 uppercase" placeholder="ID de la partie">
                        <button id="btn-join" class="w-1/3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition">
                            Rejoindre
                        </button>
                    </div>
                </div>
                <!-- Indicateur de statut de connexion -->
                <div id="connection-status" class="text-center text-sm text-yellow-500">
                    Connexion à Firebase en cours...
                </div>
            </div>
        </div>
    </div>

    <!-- Écran de jeu -->
    <div id="game-screen" class="hidden min-h-screen flex-col">
        <!-- Header / Infos -->
        <div class="bg-stone-800 p-4 shadow-md flex justify-between items-center z-10">
            <div>
                <h2 class="text-xl font-bold text-green-500">Table: <span id="display-game-id" class="text-white tracking-widest uppercase">----</span></h2>
                <p id="game-phase-text" class="text-stone-400 text-sm">En attente de joueurs...</p>
            </div>
            <div class="flex gap-3">
                <button id="btn-copy-link" class="bg-stone-700 hover:bg-stone-600 px-4 py-2 rounded text-sm transition">
                    Copier le Lien
                </button>
                <button id="btn-start" class="hidden bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-bold transition">
                    Démarrer la Partie
                </button>
            </div>
        </div>

        <!-- Table principale -->
        <div class="flex-grow flex items-center justify-center p-4 relative overflow-hidden">
            <div class="poker-table w-full max-w-4xl aspect-[2/1] md:aspect-[2.5/1] rounded-[100px] md:rounded-[200px] relative flex items-center justify-center">
                
                <!-- Cartes communes (Board) -->
                <div class="flex gap-2 md:gap-4 z-10 bg-black/20 p-4 rounded-2xl">
                    <div id="board-cards" class="flex gap-2 min-h-[80px] md:min-h-[120px]">
                        <!-- Les cartes apparaîtront ici -->
                    </div>
                </div>

                <!-- Pot -->
                <div class="absolute top-1/4 left-1/2 -translate-x-1/2 text-center z-10">
                    <div class="bg-black/60 px-4 py-1 rounded-full text-yellow-400 font-bold border border-yellow-400/30">
                        Pot: <span id="pot-amount">0</span> $
                    </div>
                </div>

                <!-- Joueurs (Générés dynamiquement) -->
                <div id="players-container" class="absolute inset-0 pointer-events-none">
                    <!-- Les joueurs seront placés ici -->
                </div>
            </div>
        </div>

        <!-- Contrôles du joueur -->
        <div class="bg-stone-800 p-4 shadow-lg border-t border-stone-700">
            <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                
                <!-- Mes Infos -->
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <div class="bg-stone-900 px-4 py-2 rounded-lg border border-stone-700">
                        <p class="text-sm text-stone-400">Mes Jetons</p>
                        <p class="text-xl font-bold text-yellow-400" id="my-chips">1000 $</p>
                    </div>
                    <div id="my-cards" class="flex gap-2">
                        <!-- Mes cartes -->
                    </div>
                </div>

                <!-- Actions -->
                <div id="action-buttons" class="flex gap-2 w-full md:w-auto opacity-50 pointer-events-none transition">
                    <button id="btn-fold" class="flex-1 md:flex-none bg-red-600 hover:bg-red-500 text-white px-6 py-3 rounded-lg font-bold">Se Coucher</button>
                    <button id="btn-call" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold">Suivre</button>
                    <div class="flex flex-1 md:flex-none gap-1">
                        <button id="btn-raise" class="bg-green-600 hover:bg-green-500 text-white px-4 py-3 rounded-l-lg font-bold">Relancer</button>
                        <input type="number" id="raise-amount" class="w-20 bg-stone-900 border border-green-600 rounded-r-lg px-2 text-center text-white outline-none" value="50" step="10">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // VOS IDENTIFIANTS FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBW9xfUVJzLAJKGRaHfgZhvCkLAK2DeSsA",
            authDomain: "site-cloud-perso.firebaseapp.com",
            projectId: "site-cloud-perso",
            storageBucket: "site-cloud-perso.firebasestorage.app",
            messagingSenderId: "849746449045",
            appId: "1:849746449045:web:56e8c6e1419df6899bc19c",
            measurementId: "G-TY1X01S31D"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            alert("Erreur critique d'initialisation Firebase : " + error.message);
        }

        let currentUser = null;
        let gameId = null;
        let isHost = false;
        let unsubscribe = null;
        let localGameState = null;

        // Positions des joueurs
        const positions = [
            "bottom-[-20px] left-1/2 -translate-x-1/2",
            "top-[10%] left-[-20px] -translate-y-1/2",
            "top-[-30px] left-1/3 -translate-x-1/2",
            "top-[-30px] right-1/3 translate-x-1/2",
            "top-[10%] right-[-20px] -translate-y-1/2"
        ];

        const statusDiv = document.getElementById('connection-status');
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                statusDiv.innerText = "Connecté aux serveurs.";
                statusDiv.classList.replace('text-yellow-500', 'text-green-500');
                checkUrlForGame();
            } else {
                statusDiv.innerText = "Tentative de connexion anonyme...";
                signInAnonymously(auth).catch((error) => {
                    statusDiv.innerText = "Erreur de connexion.";
                    statusDiv.classList.replace('text-yellow-500', 'text-red-500');
                    alert(`Échec de connexion Firebase.\nCode: ${error.code}`);
                });
            }
        });

        function checkUrlForGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const gameParam = urlParams.get('game');
            if (gameParam) {
                document.getElementById('join-game-id').value = gameParam;
            }
        }

        function showScreen(screenId) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('flex');
            
            if(screenId === 'game-screen') {
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('game-screen').classList.add('flex');
            } else {
                document.getElementById('home-screen').classList.remove('hidden');
            }
        }

        document.getElementById('btn-create').addEventListener('click', async () => {
            if (!currentUser) {
                alert("Erreur : Vous n'êtes pas connecté à Firebase. Attendez que le texte soit vert.");
                return;
            }

            const btn = document.getElementById('btn-create');
            btn.innerText = "Création en cours...";
            btn.disabled = true;

            const nameInput = document.getElementById('player-name').value.trim() || "Hôte";
            gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
            isHost = true;
            
            try {
                window.history.replaceState({}, '', `?game=${gameId}`);
            } catch(e) {}

            try {
                const initialGameData = {
                    state: 'waiting',
                    pot: 0,
                    currentBet: 0,
                    currentTurnIndex: 0,
                    phase: 'preflop',
                    communityCards: [],
                    deck: [],
                    players: [{
                        uid: currentUser.uid,
                        name: nameInput,
                        chips: 1000,
                        cards: [],
                        bet: 0,
                        folded: false,
                        isHost: true
                    }]
                };

                await setDoc(doc(db, "games", gameId), initialGameData);
                listenToGame();
                showScreen('game-screen');
            } catch (error) {
                btn.innerText = "Créer une Table (Hôte)";
                btn.disabled = false;
                alert(`Erreur de base de données : ${error.message}`);
            }
        });

        document.getElementById('btn-join').addEventListener('click', async () => {
            if (!currentUser) return alert("Attendez d'être connecté (texte vert).");

            const nameInput = document.getElementById('player-name').value.trim() || "Joueur";
            let inputId = document.getElementById('join-game-id').value.trim().toUpperCase();
            if (!inputId) return alert("Veuillez entrer un ID de partie.");
            
            const btn = document.getElementById('btn-join');
            btn.innerText = "Recherche...";
            btn.disabled = true;

            gameId = inputId;
            const gameRef = doc(db, "games", gameId);
            
            try {
                const gameSnap = await getDoc(gameRef);

                if (!gameSnap.exists()) {
                    btn.innerText = "Rejoindre";
                    btn.disabled = false;
                    return alert("Cette partie n'existe pas.");
                }

                let data = gameSnap.data();
                const existingPlayer = data.players.find(p => p.uid === currentUser.uid);
                
                if (!existingPlayer) {
                    if (data.players.length >= 5) {
                        btn.innerText = "Rejoindre"; btn.disabled = false;
                        return alert("La table est pleine.");
                    }
                    if (data.state !== 'waiting') {
                        btn.innerText = "Rejoindre"; btn.disabled = false;
                        return alert("La partie a déjà commencé.");
                    }

                    data.players.push({
                        uid: currentUser.uid,
                        name: nameInput,
                        chips: 1000,
                        cards: [],
                        bet: 0,
                        folded: false,
                        isHost: false
                    });
                    await updateDoc(gameRef, { players: data.players });
                } else {
                    isHost = existingPlayer.isHost;
                }

                try { window.history.replaceState({}, '', `?game=${gameId}`); } catch(e) {}

                listenToGame();
                showScreen('game-screen');
            } catch (error) {
                btn.innerText = "Rejoindre";
                btn.disabled = false;
                alert("Erreur réseau : " + error.message);
            }
        });

        document.getElementById('btn-copy-link').addEventListener('click', () => {
            let url = window.location.href;
            if(!url.includes('?game=')) url = url.split('?')[0] + '?game=' + gameId;
            
            navigator.clipboard.writeText(url).then(() => {
                alert("Lien copié ! Envoyez-le à vos amis.");
            }).catch(err => {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = url;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert("Lien copié (méthode de secours) !");
            });
        });

        function listenToGame() {
            if (unsubscribe) unsubscribe();
            
            unsubscribe = onSnapshot(doc(db, "games", gameId), (docSnap) => {
                if (docSnap.exists()) {
                    localGameState = docSnap.data();
                    renderGame();
                }
            }, (error) => {
                alert("La synchronisation avec la partie a été perdue.");
            });
        }

        function getCardHTML(card, hidden = false) {
            if (!card || hidden) {
                return `<div class="card card-back w-10 h-14 md:w-16 md:h-24"></div>`;
            }
            const suits = { 'H': '♥', 'D': '♦', 'C': '♣', 'S': '♠' };
            const colors = { 'H': 'red', 'D': 'red', 'C': 'black', 'S': 'black' };
            const ranks = { 11: 'J', 12: 'Q', 13: 'K', 14: 'A' };
            let rankDisp = ranks[card.rank] || card.rank;
            
            return `<div class="card ${colors[card.suit]} w-10 h-14 md:w-16 md:h-24 border border-stone-300">
                        <span class="absolute top-1 left-1 text-xs md:text-sm leading-none">${rankDisp}<br>${suits[card.suit]}</span>
                        <span class="text-xl md:text-3xl">${suits[card.suit]}</span>
                        <span class="absolute bottom-1 right-1 text-xs md:text-sm leading-none rotate-180">${rankDisp}<br>${suits[card.suit]}</span>
                    </div>`;
        }

        function renderGame() {
            if (!localGameState) return;

            document.getElementById('display-game-id').innerText = gameId;
            document.getElementById('pot-amount').innerText = localGameState.pot;
            
            let phaseText = localGameState.state === 'waiting' ? "En attente de joueurs..." : `Phase: ${localGameState.phase.toUpperCase()}`;
            if(localGameState.state === 'showdown') phaseText = "Abattage (Showdown)!";
            document.getElementById('game-phase-text').innerText = phaseText;

            if (isHost && localGameState.state === 'waiting' && localGameState.players.length > 1) {
                document.getElementById('btn-start').classList.remove('hidden');
            } else {
                document.getElementById('btn-start').classList.add('hidden');
            }

            const boardContainer = document.getElementById('board-cards');
            boardContainer.innerHTML = '';
            localGameState.communityCards.forEach(c => {
                boardContainer.innerHTML += getCardHTML(c);
            });

            const myIndex = localGameState.players.findIndex(p => p.uid === currentUser.uid);
            const myPlayer = localGameState.players[myIndex];
            
            if (myPlayer) {
                document.getElementById('my-chips').innerText = myPlayer.chips + " $";
                const myCardsContainer = document.getElementById('my-cards');
                myCardsContainer.innerHTML = '';
                if (myPlayer.cards && myPlayer.cards.length > 0) {
                    myPlayer.cards.forEach(c => {
                        myCardsContainer.innerHTML += getCardHTML(c);
                    });
                }
            }

            const playersContainer = document.getElementById('players-container');
            playersContainer.innerHTML = '';
            
            let displayIndex = 0;
            for (let i = 0; i < localGameState.players.length; i++) {
                let actualIndex = (myIndex + i) % localGameState.players.length;
                let p = localGameState.players[actualIndex];
                
                let isMe = p.uid === currentUser.uid;
                let posClass = positions[displayIndex];
                
                let showCards = isMe || localGameState.state === 'showdown';
                let card1HTML = p.cards && p.cards.length > 0 ? getCardHTML(p.cards[0], !showCards) : '';
                let card2HTML = p.cards && p.cards.length > 1 ? getCardHTML(p.cards[1], !showCards) : '';
                
                let activeClass = (localGameState.state === 'playing' && localGameState.currentTurnIndex === actualIndex && !p.folded) ? 'active-turn bg-stone-700' : 'bg-stone-800';
                let statusText = p.folded ? '<span class="text-red-500 text-xs">Couché</span>' : `<span class="text-stone-400 text-xs">Mise: ${p.bet} $</span>`;

                let avatarHTML = `
                    <div class="absolute ${posClass} player-seat flex flex-col items-center gap-2">
                        ${!isMe ? `<div class="flex gap-1">${card1HTML}${card2HTML}</div>` : ''}
                        <div class="${activeClass} px-3 py-1 md:px-4 md:py-2 rounded-full border border-stone-600 text-center shadow-lg whitespace-nowrap min-w-[100px]">
                            <p class="font-bold text-sm md:text-base ${isMe ? 'text-green-400' : 'text-white'}">${p.name}</p>
                            <p class="text-yellow-400 text-xs md:text-sm font-bold">${p.chips} $</p>
                            ${statusText}
                        </div>
                    </div>
                `;
                playersContainer.innerHTML += avatarHTML;
                displayIndex++;
            }

            const actionsDiv = document.getElementById('action-buttons');
            const callBtn = document.getElementById('btn-call');
            
            if (localGameState.state === 'playing' && localGameState.currentTurnIndex === myIndex && !myPlayer.folded) {
                actionsDiv.classList.remove('opacity-50', 'pointer-events-none');
                let amountToCall = localGameState.currentBet - myPlayer.bet;
                callBtn.innerText = amountToCall > 0 ? `Suivre (${amountToCall} $)` : "Check";
                document.getElementById('raise-amount').min = amountToCall + 10;
                document.getElementById('raise-amount').value = amountToCall + 10;
            } else {
                actionsDiv.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function createDeck() {
            let deck = [];
            const suits = ['H', 'D', 'C', 'S'];
            for (let s of suits) {
                for (let r = 2; r <= 14; r++) {
                    deck.push({ suit: s, rank: r });
                }
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        document.getElementById('btn-start').addEventListener('click', async () => {
            if (!isHost) return;
            let deck = createDeck();
            let players = [...localGameState.players];
            
            players.forEach(p => {
                p.cards = [deck.pop(), deck.pop()];
                p.folded = false;
                p.bet = 0;
            });

            await updateDoc(doc(db, "games", gameId), {
                state: 'playing',
                phase: 'preflop',
                deck: deck,
                players: players,
                communityCards: [],
                pot: 0,
                currentBet: 0,
                currentTurnIndex: 0
            });
        });

        document.getElementById('btn-fold').addEventListener('click', async () => { await processAction('fold'); });
        document.getElementById('btn-call').addEventListener('click', async () => { await processAction('call'); });
        document.getElementById('btn-raise').addEventListener('click', async () => { await processAction('raise'); });

        async function processAction(actionType) {
            if (!localGameState || localGameState.state !== 'playing') return;
            
            let state = {...localGameState};
            let pIndex = state.currentTurnIndex;
            let player = state.players[pIndex];
            
            if (actionType === 'fold') {
                player.folded = true;
            } else if (actionType === 'call') {
                let amountToCall = state.currentBet - player.bet;
                let actualCall = Math.min(amountToCall, player.chips);
                player.chips -= actualCall;
                player.bet += actualCall;
                state.pot += actualCall;
            } else if (actionType === 'raise') {
                let raiseAmt = parseInt(document.getElementById('raise-amount').value);
                let amountToCall = state.currentBet - player.bet;
                let totalBet = amountToCall + raiseAmt;
                
                if (totalBet > player.chips) totalBet = player.chips;
                
                player.chips -= totalBet;
                player.bet += totalBet;
                state.pot += totalBet;
                state.currentBet = player.bet;
            }

            let activePlayers = state.players.filter(p => !p.folded);
            let playersNeedingToAct = activePlayers.filter(p => p.bet < state.currentBet && p.chips > 0);
            
            if (activePlayers.length === 1) {
                activePlayers[0].chips += state.pot;
                state.state = 'waiting';
                alert(activePlayers[0].name + " gagne " + state.pot + " $ !");
            } else {
                let nextIdx = (pIndex + 1) % state.players.length;
                let startSearch = nextIdx;
                let roundOver = playersNeedingToAct.length === 0 && (pIndex === state.players.length - 1 || state.currentBet > 0 || actionType === 'call');

                if (roundOver) {
                    advancePhase(state);
                } else {
                    while (state.players[nextIdx].folded || state.players[nextIdx].chips === 0) {
                        nextIdx = (nextIdx + 1) % state.players.length;
                        if(nextIdx === startSearch) break;
                    }
                    state.currentTurnIndex = nextIdx;
                }
            }

            await updateDoc(doc(db, "games", gameId), state);
        }

        function advancePhase(state) {
            state.players.forEach(p => p.bet = 0);
            state.currentBet = 0;
            state.currentTurnIndex = 0;
            while(state.players[state.currentTurnIndex].folded) {
                state.currentTurnIndex = (state.currentTurnIndex + 1) % state.players.length;
            }

            if (state.phase === 'preflop') {
                state.phase = 'flop';
                state.communityCards.push(state.deck.pop(), state.deck.pop(), state.deck.pop());
            } else if (state.phase === 'flop') {
                state.phase = 'turn';
                state.communityCards.push(state.deck.pop());
            } else if (state.phase === 'turn') {
                state.phase = 'river';
                state.communityCards.push(state.deck.pop());
            } else if (state.phase === 'river') {
                state.state = 'showdown';
                evaluateWinner(state);
            }
        }

        function evaluateWinner(state) {
            let active = state.players.filter(p => !p.folded);
            let winner = active[0];
            let maxHighCard = 0;

            active.forEach(p => {
                let allCards = [...p.cards, ...state.communityCards];
                let highest = Math.max(...allCards.map(c => c.rank));
                if (highest > maxHighCard) {
                    maxHighCard = highest;
                    winner = p;
                }
            });

            winner.chips += state.pot;
            
            setTimeout(async () => {
                alert(winner.name + " gagne le pot de " + state.pot + " $ avec la carte haute !");
                state.state = 'waiting';
                state.pot = 0;
                state.communityCards = [];
                state.players.forEach(p => { p.cards = []; p.bet = 0; });
                await updateDoc(doc(db, "games", gameId), state);
            }, 3000);
        }
    </script>
</body>
</html>
