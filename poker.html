<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker Multijoueur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a202c; color: white; margin: 0; overflow: hidden; }
        .poker-table {
            background: radial-gradient(ellipse at center, #2e7d32 0%, #1b5e20 100%);
            border: 15px solid #5d4037;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
        }
        .card {
            width: 60px; height: 85px;
            background-color: white; color: black;
            border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 5px; box-sizing: border-box; font-weight: bold; font-size: 1.2rem;
            position: relative;
        }
        .card.red { color: #d32f2f; }
        .card-back {
            background: linear-gradient(135deg, #1976d2 25%, transparent 25%) -20px 0,
                        linear-gradient(225deg, #1976d2 25%, transparent 25%) -20px 0,
                        linear-gradient(315deg, #1976d2 25%, transparent 25%),
                        linear-gradient(45deg, #1976d2 25%, transparent 25%);
            background-size: 40px 40px;
            background-color: #1565c0;
            border: 2px solid white;
        }
        .suit-center { font-size: 2rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .chip {
            width: 30px; height: 30px; border-radius: 50%;
            background: repeating-conic-gradient(#fff 0 15deg, #000 15deg 30deg);
            display: inline-block; position: relative;
        }
        .chip::after {
            content: ''; position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px;
            border-radius: 50%; background-color: #f44336; border: 2px dashed white;
        }
        
        /* Positions des joueurs autour de la table */
        .player-seat { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; }
        .seat-0 { top: 85%; left: 50%; } /* Bas Centre (Moi) */
        .seat-1 { top: 50%; left: 15%; } /* Gauche */
        .seat-2 { top: 15%; left: 30%; } /* Haut Gauche */
        .seat-3 { top: 15%; left: 70%; } /* Haut Droite */
        .seat-4 { top: 50%; left: 85%; } /* Droite */
        
        .active-player-glow { box-shadow: 0 0 15px 5px #ffeb3b; }
        
        /* Notifications */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 10px; }
        .notification { background-color: rgba(0,0,0,0.8); color: white; padding: 15px 20px; border-radius: 8px; transition: opacity 0.3s; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl font-bold text-green-400">Texas Hold'em <span class="text-white text-sm" id="game-id-display"></span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <span id="connection-status" class="text-yellow-400 text-sm">Connexion...</span>
            <button id="invite-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-semibold transition hidden">
                🔗 Copier Lien d'Invitation
            </button>
        </div>
    </header>

    <div id="notification-container"></div>

    <!-- Écran de chargement / Lobby -->
    <div id="lobby-screen" class="absolute inset-0 bg-gray-900 z-40 flex flex-col items-center justify-center">
        <h2 class="text-4xl font-bold mb-8 text-green-400">Poker Room</h2>
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl text-center max-w-md w-full">
            <input type="text" id="player-name-input" placeholder="Votre Pseudo" class="w-full p-3 mb-4 rounded bg-gray-700 text-white border border-gray-600 focus:border-green-400 focus:outline-none text-center text-lg">
            <button id="join-game-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded transition text-xl">
                Rejoindre la Table
            </button>
            <div id="lobby-message" class="mt-4 text-red-400"></div>
        </div>
    </div>

    <!-- Zone de jeu principale -->
    <main class="flex-grow relative flex items-center justify-center overflow-hidden p-4" id="game-area" style="display: none;">
        
        <!-- Table de poker -->
        <div class="poker-table w-full max-w-4xl aspect-[2/1] rounded-full relative flex items-center justify-center">
            
            <!-- Cartes communes et Pot au centre -->
            <div class="absolute flex flex-col items-center gap-4">
                <div class="text-xl font-bold bg-black/50 px-4 py-1 rounded-full text-yellow-400 flex items-center gap-2">
                    Pot: <span id="main-pot">0</span> $
                </div>
                <div id="community-cards" class="flex gap-2 min-h-[85px]">
                    <!-- Cartes communes générées ici -->
                </div>
                <div id="game-phase-display" class="text-sm text-gray-300 font-semibold tracking-widest uppercase bg-black/30 px-3 py-1 rounded">
                    EN ATTENTE
                </div>
            </div>

            <!-- Joueurs -->
            <div id="players-container" class="absolute inset-0 pointer-events-none">
                <!-- Joueurs générés ici -->
            </div>
            
            <!-- Bouton Démarrer (visible seulement pour l'hôte ou si assez de joueurs) -->
            <button id="start-game-btn" class="absolute bg-green-500 hover:bg-green-400 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform -translate-y-1/2 pointer-events-auto hidden z-20">
                Démarrer la Partie
            </button>
        </div>

    </main>

    <footer id="player-controls" class="bg-gray-800 p-4 border-t border-gray-700 flex justify-between items-center z-10 hidden">
        <div class="flex flex-col">
            <span class="text-sm text-gray-400">Vos Jetons</span>
            <span id="my-chips" class="text-2xl font-bold text-yellow-400">0 $</span>
        </div>
        
        <div class="flex gap-4 flex-1 justify-center max-w-2xl">
            <button id="btn-fold" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded disabled:opacity-50 disabled:cursor-not-allowed transition">
                Se Coucher
            </button>
            <button id="btn-call" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded disabled:opacity-50 disabled:cursor-not-allowed transition">
                Suivre (<span id="call-amount">0</span>)
            </button>
            <div class="flex-1 flex gap-2">
                <input type="number" id="raise-input" class="w-20 bg-gray-700 text-white text-center rounded border border-gray-600 focus:border-yellow-400 focus:outline-none" min="0">
                <button id="btn-raise" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 px-2 rounded disabled:opacity-50 disabled:cursor-not-allowed transition">
                    Relancer
                </button>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration Firebase (utilise la config globale de l'environnement)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            // Fallback pour le dev local si besoin (laisser vide car injecté par le système)
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Variables Globales
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'poker-app-v1';
        let currentUser = null;
        let gameId = new URLSearchParams(window.location.search).get('game');
        let isHost = !gameId; // Si pas d'ID dans l'URL, on est l'hôte
        if (isHost) {
            gameId = Math.random().toString(36).substring(2, 9).toUpperCase();
            try {
                window.history.replaceState({}, '', `?game=${gameId}`);
            } catch(e) {
                console.warn("Environnement restreint: impossible de modifier l'URL via replaceState.", e);
            }
        }
        
        // Structure de chemin Firebase stricte selon les règles
        const getGameDocRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);

        // Constantes du jeu
        const INITIAL_CHIPS = 1000;
        const SMALL_BLIND = 10;
        const BIG_BLIND = 20;

        let gameState = null;
        let myPlayerId = null;

        // Elements DOM
        const ui = {
            status: document.getElementById('connection-status'),
            lobby: document.getElementById('lobby-screen'),
            gameArea: document.getElementById('game-area'),
            controls: document.getElementById('player-controls'),
            inviteBtn: document.getElementById('invite-btn'),
            joinBtn: document.getElementById('join-game-btn'),
            startBtn: document.getElementById('start-game-btn'),
            nameInput: document.getElementById('player-name-input'),
            playersContainer: document.getElementById('players-container'),
            communityCards: document.getElementById('community-cards'),
            mainPot: document.getElementById('main-pot'),
            myChips: document.getElementById('my-chips'),
            gameIdDisplay: document.getElementById('game-id-display'),
            phaseDisplay: document.getElementById('game-phase-display'),
            // Boutons d'action
            btnFold: document.getElementById('btn-fold'),
            btnCall: document.getElementById('btn-call'),
            btnRaise: document.getElementById('btn-raise'),
            callAmount: document.getElementById('call-amount'),
            raiseInput: document.getElementById('raise-input'),
            notifContainer: document.getElementById('notification-container')
        };

        ui.gameIdDisplay.textContent = `#${gameId}`;

        // Utilitaire: Notifications
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            ui.notifContainer.appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        // Utilitaire: Copier Lien
        ui.inviteBtn.addEventListener('click', () => {
            let url = window.location.href;
            if (!url.includes('game=')) {
                url = url.split('?')[0] + '?game=' + gameId;
            }
            const textarea = document.createElement('textarea');
            textarea.value = url;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showNotification("Lien d'invitation copié !");
            } catch (err) {
                console.error('Erreur de copie', err);
            }
            document.body.removeChild(textarea);
        });

        const suits = ['♠', '♥', '♦', '♣'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K', 'A'];
        
        function createDeck() {
            let deck = [];
            for (let s of suits) {
                for (let v of values) {
                    deck.push({ suit: s, value: v });
                }
            }
            // Fisher-Yates shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        // Rendu visuel d'une carte
        function renderCard(cardData, isHidden = false) {
            if (isHidden) {
                return `<div class="card card-back"></div>`;
            }
            if (!cardData) return '';
            const isRed = cardData.suit === '♥' || cardData.suit === '♦';
            const colorClass = isRed ? 'red' : '';
            return `
                <div class="card ${colorClass}">
                    <div>${cardData.value} ${cardData.suit}</div>
                    <div class="suit-center">${cardData.suit}</div>
                    <div style="text-align: right; transform: rotate(180deg);">${cardData.value} ${cardData.suit}</div>
                </div>
            `;
        }

        async function initAuth() {
            ui.status.textContent = "Authentification...";
            try {
                if (typeof __initial_auth_token !== 'undefined') {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                ui.status.textContent = "Erreur Auth";
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                myPlayerId = user.uid;
                ui.status.textContent = "Connecté";
                ui.status.classList.replace('text-yellow-400', 'text-green-400');
                
                // Si on est l'hôte, on initialise le document du jeu s'il n'existe pas
                const gameRef = getGameDocRef();
                const gameSnap = await getDoc(gameRef);
                
                if (!gameSnap.exists() && isHost) {
                    await setDoc(gameRef, {
                        phase: 'WAITING', // WAITING, PREFLOP, FLOP, TURN, RIVER, SHOWDOWN
                        pot: 0,
                        currentBet: 0,
                        dealerIndex: 0,
                        activePlayerIndex: 0,
                        deck: [],
                        communityCards: [],
                        players: [], // [{ id, name, chips, bet, folded, cards: [] }]
                        hostId: myPlayerId,
                        lastAction: 'Game created'
                    });
                } else if (!gameSnap.exists()) {
                    document.getElementById('lobby-message').textContent = "Partie introuvable.";
                    return;
                }

                // Démarrer l'écoute de l'état du jeu
                listenToGame();
            }
        });

        ui.joinBtn.addEventListener('click', async () => {
            const name = ui.nameInput.value.trim() || "Joueur " + Math.floor(Math.random()*1000);
            if (!currentUser) return;

            ui.joinBtn.disabled = true;
            ui.joinBtn.textContent = "Connexion...";

            try {
                // Utilisation de runTransaction pour éviter les conflits d'ajout simultané
                await runTransaction(db, async (transaction) => {
                    const gameRef = getGameDocRef();
                    const gameDoc = await transaction.get(gameRef);
                    if (!gameDoc.exists()) throw "Partie n'existe plus";
                    
                    const data = gameDoc.data();
                    let players = data.players || [];
                    
                    // Vérifier si déjà dans la partie
                    if (players.find(p => p.id === myPlayerId)) {
                        return; // Déjà là
                    }

                    if (players.length >= 5) {
                        throw "Table pleine (Max 5)";
                    }

                    players.push({
                        id: myPlayerId,
                        name: name,
                        chips: INITIAL_CHIPS,
                        bet: 0,
                        folded: false,
                        cards: []
                    });

                    transaction.update(gameRef, { players: players });
                });

                ui.lobby.style.display = 'none';
                ui.gameArea.style.display = 'flex';
                ui.inviteBtn.classList.remove('hidden');
                
                // Si on a rejoint en cours de jeu, les contrôles s'afficheront via listenToGame
            } catch (error) {
                console.error("Erreur join:", error);
                document.getElementById('lobby-message').textContent = error;
                ui.joinBtn.disabled = false;
                ui.joinBtn.textContent = "Rejoindre la Table";
            }
        });

        function listenToGame() {
            onSnapshot(getGameDocRef(), (docSnap) => {
                if (!docSnap.exists()) return;
                gameState = docSnap.data();
                renderGame();
                updateControls();
            }, (error) => {
                console.error("Erreur Snapshot:", error);
            });
        }

        function renderGame() {
            if (!gameState) return;

            // Masquer le lobby si on est déjà dans les joueurs
            const me = gameState.players.find(p => p.id === myPlayerId);
            if (me) {
                ui.lobby.style.display = 'none';
                ui.gameArea.style.display = 'flex';
                ui.controls.classList.remove('hidden');
                ui.inviteBtn.classList.remove('hidden');
                ui.myChips.textContent = `${me.chips} $`;
            }

            // Mettre à jour les infos communes
            ui.mainPot.textContent = gameState.pot;
            
            let phaseText = gameState.phase;
            if(phaseText === 'WAITING') phaseText = 'En Attente de Joueurs';
            ui.phaseDisplay.textContent = phaseText;

            // Rendu des cartes communes
            ui.communityCards.innerHTML = '';
            gameState.communityCards.forEach(card => {
                ui.communityCards.innerHTML += renderCard(card);
            });

            // Bouton Start (Seulement pour l'hôte en mode WAITING avec au moins 2 joueurs)
            if (gameState.hostId === myPlayerId && gameState.phase === 'WAITING' && gameState.players.length >= 2) {
                ui.startBtn.classList.remove('hidden');
            } else {
                ui.startBtn.classList.add('hidden');
            }

            // Rendu des joueurs
            renderPlayers();
        }

        function renderPlayers() {
            ui.playersContainer.innerHTML = '';
            
            // Calculer les positions relatives. Pour le joueur actuel, il doit être en bas (seat-0)
            const myIndex = gameState.players.findIndex(p => p.id === myPlayerId);
            const totalPlayers = gameState.players.length;
            
            gameState.players.forEach((player, originalIndex) => {
                // Mapping des sièges (0=Moi, puis on tourne dans le sens horaire)
                let seatIndex = 0;
                if (myIndex !== -1) {
                    seatIndex = (originalIndex - myIndex + totalPlayers) % totalPlayers;
                } else {
                    seatIndex = originalIndex; // Spectateur
                }
                
                // On a 5 sièges max définis dans le CSS
                const seatClass = `seat-${seatIndex}`;
                
                const isActive = gameState.phase !== 'WAITING' && gameState.activePlayerIndex === originalIndex && !player.folded;
                const isDealer = gameState.dealerIndex === originalIndex;
                
                // Affichage des cartes
                let cardsHTML = '';
                if (player.cards && player.cards.length === 2) {
                    if (player.folded) {
                         cardsHTML = '<div class="text-xs text-red-400 bg-black/50 px-2 rounded">Couché</div>';
                    } else if (player.id === myPlayerId || gameState.phase === 'SHOWDOWN') {
                        // Montrer les cartes à moi-même ou à tout le monde au showdown
                        cardsHTML = `
                            <div class="flex gap-1 transform scale-75 origin-top">
                                ${renderCard(player.cards[0])}
                                ${renderCard(player.cards[1])}
                            </div>
                        `;
                    } else {
                        // Cacher les cartes des autres en jeu
                        cardsHTML = `
                            <div class="flex gap-1 transform scale-75 origin-top">
                                ${renderCard(null, true)}
                                ${renderCard(null, true)}
                            </div>
                        `;
                    }
                }

                // Info bulle de mise
                const betDisplay = player.bet > 0 
                    ? `<div class="absolute -top-10 bg-black/70 text-yellow-400 px-3 py-1 rounded-full text-sm font-bold shadow flex items-center gap-1 border border-yellow-600/50">
                         <div class="w-3 h-3 rounded-full bg-yellow-500"></div> ${player.bet}$
                       </div>` 
                    : '';

                const dealerBtn = isDealer ? `<div class="absolute -left-6 bottom-0 w-6 h-6 bg-white text-black rounded-full flex items-center justify-center text-xs font-bold shadow-md border-2 border-gray-300">D</div>` : '';

                const el = document.createElement('div');
                el.className = `player-seat ${seatClass} pointer-events-auto`;
                el.innerHTML = `
                    ${betDisplay}
                    ${cardsHTML}
                    <div class="bg-gray-800 border-2 ${isActive ? 'border-yellow-400 active-player-glow' : 'border-gray-600'} rounded-lg px-4 py-2 mt-2 text-center shadow-lg relative min-w-[120px]">
                        ${dealerBtn}
                        <div class="font-bold text-white truncate max-w-[100px]">${player.name}</div>
                        <div class="text-yellow-400 text-sm">${player.chips} $</div>
                    </div>
                `;
                ui.playersContainer.appendChild(el);
            });
        }

        function updateControls() {
            if (!gameState || gameState.phase === 'WAITING' || gameState.phase === 'SHOWDOWN') {
                disableAllButtons();
                return;
            }

            const myIndex = gameState.players.findIndex(p => p.id === myPlayerId);
            if (myIndex === -1) {
                disableAllButtons(); // Spectateur
                return;
            }

            const me = gameState.players[myIndex];
            const isMyTurn = gameState.activePlayerIndex === myIndex && !me.folded;

            if (!isMyTurn) {
                disableAllButtons();
                return;
            }

            // C'est mon tour
            ui.btnFold.disabled = false;
            
            const callAmount = gameState.currentBet - me.bet;
            ui.callAmount.textContent = callAmount > 0 ? callAmount : 'Check';
            
            if (me.chips >= callAmount) {
                ui.btnCall.disabled = false;
            } else {
                ui.btnCall.disabled = true; // Ne peut pas suivre (devrait être All-in, simplifions)
                // Note: Dans un vrai jeu, ce serait un All-in
            }

            const minRaise = gameState.currentBet + BIG_BLIND; // Relance minimale simple
            ui.raiseInput.min = minRaise;
            ui.raiseInput.value = minRaise;

            if (me.chips > callAmount) {
                ui.btnRaise.disabled = false;
                ui.raiseInput.disabled = false;
            } else {
                ui.btnRaise.disabled = true;
                ui.raiseInput.disabled = true;
            }
        }

        function disableAllButtons() {
            ui.btnFold.disabled = true;
            ui.btnCall.disabled = true;
            ui.btnRaise.disabled = true;
            ui.raiseInput.disabled = true;
            ui.callAmount.textContent = "0";
        }

        ui.btnFold.addEventListener('click', () => submitAction('FOLD'));
        ui.btnCall.addEventListener('click', () => submitAction('CALL'));
        ui.btnRaise.addEventListener('click', () => {
            const amount = parseInt(ui.raiseInput.value);
            if (amount && !isNaN(amount)) submitAction('RAISE', amount);
        });

        async function submitAction(actionType, amount = 0) {
            if (!currentUser || !gameState) return;
            disableAllButtons(); // Prévenir le double clic

            try {
                await runTransaction(db, async (transaction) => {
                    const gameRef = getGameDocRef();
                    const gameDoc = await transaction.get(gameRef);
                    if (!gameDoc.exists()) throw "Jeu introuvable";
                    
                    let data = gameDoc.data();
                    const myIndex = data.players.findIndex(p => p.id === myPlayerId);
                    
                    // Vérifications de sécurité de base
                    if (data.activePlayerIndex !== myIndex) throw "Ce n'est pas votre tour";
                    
                    let player = data.players[myIndex];
                    let logAction = "";

                    if (actionType === 'FOLD') {
                        player.folded = true;
                        logAction = `${player.name} se couche.`;
                    } else if (actionType === 'CALL') {
                        const callDiff = data.currentBet - player.bet;
                        const actualCall = Math.min(callDiff, player.chips); // All-in partiel si pas assez
                        player.chips -= actualCall;
                        player.bet += actualCall;
                        data.pot += actualCall;
                        logAction = callDiff === 0 ? `${player.name} check.` : `${player.name} suit (${actualCall}).`;
                    } else if (actionType === 'RAISE') {
                        // Montant total de la mise finale demandée par le raise
                        if (amount <= data.currentBet || amount > player.chips + player.bet) throw "Montant invalide";
                        const addAmount = amount - player.bet;
                        player.chips -= addAmount;
                        player.bet += addAmount;
                        data.pot += addAmount;
                        data.currentBet = amount;
                        logAction = `${player.name} relance à ${amount}.`;
                    }

                    // Déterminer le prochain état (avancer le tour)
                    data.lastAction = logAction;
                    const nextStateData = calculateNextGameState(data);
                    
                    transaction.update(gameRef, nextStateData);
                });
            } catch (err) {
                console.error("Erreur action:", err);
                showNotification("Erreur : " + err);
                updateControls(); // Réactiver si échec
            }
        }

        // Cette fonction tourne lors d'une transaction Firebase pour déterminer la suite
        function calculateNextGameState(data) {
            let activeCount = data.players.filter(p => !p.folded).length;
            
            // 1. Si un seul joueur reste -> Il gagne
            if (activeCount === 1) {
                const winner = data.players.find(p => !p.folded);
                winner.chips += data.pot;
                data.lastAction = `${winner.name} gagne ${data.pot} (les autres couchés).`;
                return resetRound(data);
            }

            // 2. Vérifier si le tour de mise est terminé
            // Le tour est fini si tous les joueurs non-couchés ont misé le même montant (currentBet)
            // et que tout le monde a eu l'opportunité de jouer.
            // (Simplification : on suppose que si bet == currentBet, on a fini, sauf si c'est le début du tour)
            
            let roundFinished = true;
            for (let p of data.players) {
                if (!p.folded && p.bet < data.currentBet) {
                    roundFinished = false;
                    break;
                }
            }
            
            // Trouver le prochain joueur actif
            let nextActive = (data.activePlayerIndex + 1) % data.players.length;
            while (data.players[nextActive].folded) {
                nextActive = (nextActive + 1) % data.players.length;
            }

            if (!roundFinished) {
                // Le tour continue
                data.activePlayerIndex = nextActive;
                return data;
            }

            // 3. Le tour est fini, on passe à la phase suivante
            // Réinitialiser les mises de table pour la phase suivante
            data.players.forEach(p => { p.bet = 0; });
            data.currentBet = 0;
            
            // Le premier à parler est celui après le dealer
            data.activePlayerIndex = getNextActivePlayer(data.dealerIndex, data.players);

            if (data.phase === 'PREFLOP') {
                data.phase = 'FLOP';
                data.communityCards = [data.deck.pop(), data.deck.pop(), data.deck.pop()];
            } else if (data.phase === 'FLOP') {
                data.phase = 'TURN';
                data.communityCards.push(data.deck.pop());
            } else if (data.phase === 'TURN') {
                data.phase = 'RIVER';
                data.communityCards.push(data.deck.pop());
            } else if (data.phase === 'RIVER') {
                // SHOWDOWN
                data.phase = 'SHOWDOWN';
                data = evaluateShowdown(data);
            }

            return data;
        }

        function getNextActivePlayer(startIndex, players) {
            let next = (startIndex + 1) % players.length;
            while (players[next].folded) {
                next = (next + 1) % players.length;
            }
            return next;
        }

        ui.startBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            try {
                await runTransaction(db, async (transaction) => {
                    const gameRef = getGameDocRef();
                    const docSnap = await transaction.get(gameRef);
                    let data = docSnap.data();
                    
                    if (data.players.length < 2) throw "Pas assez de joueurs";
                    
                    data = resetRound(data, true); // true = init first dealer
                    transaction.update(gameRef, data);
                });
            } catch (err) {
                showNotification(err);
            }
        });

        function resetRound(data, isFirstGame = false) {
            data.deck = createDeck();
            data.communityCards = [];
            data.pot = 0;
            data.currentBet = BIG_BLIND;
            data.phase = 'PREFLOP';

            // Gérer le Dealer
            if (isFirstGame) {
                data.dealerIndex = 0;
            } else {
                data.dealerIndex = (data.dealerIndex + 1) % data.players.length;
                // Exclure les joueurs sans jetons (simplification: on devrait les virer)
            }

            // Blinds
            const sbIndex = (data.dealerIndex + 1) % data.players.length;
            const bbIndex = (data.dealerIndex + 2) % data.players.length;

            data.players.forEach((p, index) => {
                p.folded = false;
                p.bet = 0;
                p.cards = [data.deck.pop(), data.deck.pop()];
                
                if (index === sbIndex) {
                    let bet = Math.min(SMALL_BLIND, p.chips);
                    p.chips -= bet; p.bet = bet; data.pot += bet;
                } else if (index === bbIndex) {
                    let bet = Math.min(BIG_BLIND, p.chips);
                    p.chips -= bet; p.bet = bet; data.pot += bet;
                }
            });

            // Le premier à parler pré-flop est Under The Gun (après BB)
            data.activePlayerIndex = (bbIndex + 1) % data.players.length;
            
            // Attendre un peu avant de redémarrer si on vient d'un showdown
            return data;
        }

        // Pour garder le code compact, ceci est un évaluateur très basique.
        // En prod, on utiliserait une librairie d'évaluation de poker 7 cartes.
        // Ici: on donne le pot au hasard parmi les non-couchés (Placeholder pour la complexité algorithmique d'un vrai évaluateur dans un seul fichier).
        // EDIT: Faisons un évaluateur basique par valeur de la carte la plus haute pour que ce soit jouable.
        
        function evaluateShowdown(data) {
            const activePlayers = data.players.filter(p => !p.folded);
            
            // Simplification extrême de l'évaluation : 
            // On convertit les valeurs (2=2... A=14)
            const getVal = (v) => {
                if(v==='T') return 10; if(v==='J') return 11; if(v==='Q') return 12; 
                if(v==='K') return 13; if(v==='A') return 14; return parseInt(v);
            };

            // On trouve le score max d'un joueur basé uniquement sur sa meilleure carte privée + somme
            // (Ceci N'EST PAS du vrai poker, mais permet au jeu de se terminer et de distribuer le pot sans faire 500 lignes de combinaisons)
            let maxScore = -1;
            let winners = [];

            activePlayers.forEach(p => {
                let score = Math.max(getVal(p.cards[0].value), getVal(p.cards[1].value)) * 100 + getVal(p.cards[0].value) + getVal(p.cards[1].value);
                if (score > maxScore) {
                    maxScore = score;
                    winners = [p];
                } else if (score === maxScore) {
                    winners.push(p);
                }
            });

            // Split pot
            const winAmount = Math.floor(data.pot / winners.length);
            winners.forEach(w => {
                const player = data.players.find(p => p.id === w.id);
                player.chips += winAmount;
            });

            data.lastAction = `Showdown! ${winners.map(w=>w.name).join(', ')} gagne(nt) avec la carte haute.`;
            data.pot = 0;
            
            // Planifier la prochaine manche via un flag ou la laisser manuelle pour l'hôte ?
            // L'idéal est un délai. Vu que c'est géré par l'état, on force un état WAITING_NEXT.
            // Pour simplifier ce fichier, on remet direct WAITING et l'hôte doit relancer.
            data.phase = 'WAITING';
            
            return data;
        }

        // Lancement
        initAuth();

    </script>
