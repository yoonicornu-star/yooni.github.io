<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace 3D</title>
    <!-- Chargement de Three.js depuis un CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #instructions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            text-align: center;
            cursor: pointer;
        }

        #instructions h1 { font-size: 3em; margin-bottom: 10px; }
        #instructions p { font-size: 1.2em; color: #ccc; }

        #interaction-message {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            display: none;
            z-index: 5;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            text-shadow: 1px 1px 2px black;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }

        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #3498db;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 20;
            animation: fadeInOut 3s forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>Mon Home 3D (Avec Étage)</h1>
        <p>Cliquez pour jouer</p>
        <p style="font-size: 0.9em; margin-top: 20px;">
            ZQSD / Flèches pour se déplacer<br>
            Souris pour regarder<br>
            Espace pour sauter<br>
            Échap pour quitter
        </p>
    </div>

    <div id="crosshair"></div>
    <div id="interaction-message">Appuyez sur 'E'</div>
    <div id="notification">Action en cours...</div>
    <div id="canvas-container"></div>

    <script>
        const PointerLockControls = function ( camera, domElement ) {
            this.domElement = domElement;
            this.isLocked = false;
            this.minPolarAngle = 0; 
            this.maxPolarAngle = Math.PI; 
            const scope = this;
            const euler = new THREE.Euler( 0, 0, 0, 'YXZ' );
            const PI_2 = Math.PI / 2;
            const vec = new THREE.Vector3();

            function onMouseMove( event ) {
                if ( scope.isLocked === false ) return;
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
                euler.setFromQuaternion( camera.quaternion );
                euler.y -= movementX * 0.002;
                euler.x -= movementY * 0.002;
                euler.x = Math.max( PI_2 - scope.maxPolarAngle, Math.min( PI_2 - scope.minPolarAngle, euler.x ) );
                camera.quaternion.setFromEuler( euler );
            }

            function onPointerlockChange() {
                if ( document.pointerLockElement === scope.domElement ) {
                    document.addEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = true;
                    window.dispatchEvent(new Event('controlsLocked'));
                } else {
                    document.removeEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = false;
                    window.dispatchEvent(new Event('controlsUnlocked'));
                }
            }
            this.connect = function () {
                document.addEventListener( 'pointerlockchange', onPointerlockChange, false );
            };
            this.disconnect = function () {
                document.removeEventListener( 'pointerlockchange', onPointerlockChange, false );
            };
            this.lock = function () { this.domElement.requestPointerLock(); };
            this.unlock = function () { document.exitPointerLock(); };
            this.getObject = function () { return camera; };
            this.getDirection = function () {
                const direction = new THREE.Vector3( 0, 0, - 1 );
                return direction.applyQuaternion( camera.quaternion );
            };
            this.moveForward = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                vec.crossVectors( camera.up, vec );
                camera.position.addScaledVector( vec, distance );
            };
            this.moveRight = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                camera.position.addScaledVector( vec, distance );
            };
            this.connect();
        };

        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const instructions = document.getElementById( 'instructions' );
        const interactionMsg = document.getElementById( 'interaction-message' );
        const notificationMsg = document.getElementById( 'notification' );

        // Gestion de l'environnement physique
        let interactableObjects = []; 
        let closestObject = null;     
        const interactionDistance = 15; 
        
        // Tableaux pour la gestion de la physique 3D
        const walls = [];  
        const floors = []; 

        // Variables spécifiques à l'ascenseur
        let elevatorPlatform;
        let elevatorData;
        let elevatorTargetY = 0;
        let elevatorBtnObj; // Le bouton interne qui monte avec la cabine

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x87CEEB ); 
            scene.fog = new THREE.Fog( 0xffffff, 0, 750 ); 

            const light = new THREE.HemisphereLight( 0xeeeeff, 0x777788, 0.75 );
            light.position.set( 0.5, 1, 0.75 );
            scene.add( light );

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(20, 50, 20);
            scene.add(directionalLight);

            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.set(0, 10, 0); // Point de départ

            controls = new PointerLockControls( camera, document.body );
            instructions.addEventListener( 'click', () => controls.lock() );
            window.addEventListener('controlsLocked', () => instructions.style.display = 'none');
            window.addEventListener('controlsUnlocked', () => {
                instructions.style.display = 'flex';
                interactionMsg.style.display = 'none'; 
            });

            createEnvironment();

            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            window.addEventListener( 'resize', onWindowResize );
            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );
        }

        function createWall(x, y, z, width, height, depth, color) {
            const geometry = new THREE.BoxGeometry(width, height, depth);
            const material = new THREE.MeshLambertMaterial({ color: color });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set(x, y + height/2, z);
            scene.add(wall);
            // On enregistre les limites 3D du mur
            walls.push({
                minX: x - width/2, maxX: x + width/2,
                minY: y, maxY: y + height,
                minZ: z - depth/2, maxZ: z + depth/2
            });
        }

        function createFloor(x, y, z, width, depth, material) {
            const geometry = new THREE.PlaneGeometry(width, depth);
            const floor = new THREE.Mesh(geometry, material);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(x, y, z);
            scene.add(floor);
            // On ajoute cette zone comme un sol praticable
            floors.push({
                minX: x - width/2, maxX: x + width/2,
                minZ: z - depth/2, maxZ: z + depth/2,
                y: y
            });
        }

        function createInteractableObject(x, y, z, title, url, color, isCube=false, actionType="link") {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 700;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 512, 700);
            ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center'; ctx.fillText(title, 256, 80);
            ctx.fillStyle = '#7f8c8d'; ctx.textAlign = 'left'; ctx.font = '22px sans-serif';
            ctx.fillText("Appuyez sur 'E'", 40, 150);
            for(let i=0; i<12; i++) {
                ctx.fillRect(40, 180 + i * 35, 432 - (Math.random() * 100), 15);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            const frontMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.8 });
            const coverMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.5 });
            
            let geometry, materials;
            if (isCube) {
                geometry = new THREE.BoxGeometry(5, 5, 5); 
                materials = [coverMat, coverMat, coverMat, coverMat, frontMat, coverMat];
            } else {
                geometry = new THREE.BoxGeometry(4, 6, 0.5); 
                materials = [coverMat, coverMat, coverMat, coverMat, frontMat, coverMat];
            }
            
            const mesh = new THREE.Mesh(geometry, materials);
            mesh.position.set(x, y + 10, z);
            scene.add(mesh);
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(3, 4, 2, 16), new THREE.MeshLambertMaterial({color: 0x333333}));
            base.position.set(x, y + 1, z);
            scene.add(base);

            interactableObjects.push({ mesh: mesh, baseY: y + 10, title: title, url: url, actionType: actionType });
        }

        function createEnvironment() {
            const canvasChecker = document.createElement('canvas');
            canvasChecker.width = 128; canvasChecker.height = 128;
            const ctxC = canvasChecker.getContext('2d');
            ctxC.fillStyle = '#ffffff'; ctxC.fillRect(0, 0, 128, 128);
            ctxC.fillStyle = '#bdc3c7'; ctxC.fillRect(0, 0, 64, 64); ctxC.fillRect(64, 64, 64, 64);
            const texChecker = new THREE.CanvasTexture(canvasChecker);
            texChecker.wrapS = THREE.RepeatWrapping; texChecker.wrapT = THREE.RepeatWrapping;
            texChecker.repeat.set(5, 10);

            const matHallway = new THREE.MeshLambertMaterial({ map: texChecker });
            const matWood = new THREE.MeshLambertMaterial({ color: 0x8B5A2B }); 
            const matScience = new THREE.MeshLambertMaterial({ color: 0x111111 }); 
            const matMuseum = new THREE.MeshLambertMaterial({ color: 0x8B0000 }); 
            const matConcrete = new THREE.MeshLambertMaterial({ color: 0x555555 });

            // Plancher de secours
            createFloor(0, -2, 0, 300, 300, new THREE.MeshBasicMaterial({visible: false}));

            // --- REZ-DE-CHAUSSÉE (Y = 0) ---
            createFloor(0, 0, 0, 40, 100, matHallway); // X de -20 à 20
            createWall(0, 0, 50, 40, 40, 2, 0x7f8c8d); // Mur Arrière
            
            // Murs Couloir (Découpés pour laisser l'ascenseur)
            createWall(-20, 0, -27.5, 2, 40, 45, 0x7f8c8d); // Gauche Avant
            createWall(-20, 0, 27.5, 2, 40, 45, 0x7f8c8d);  // Gauche Arrière (Laisse trou de Z=-5 à 5)
            createWall(20, 0, 30, 2, 40, 40, 0x7f8c8d); // Droite
            createWall(20, 0, -30, 2, 40, 40, 0x7f8c8d); // Droite

            // Salles (RDC)
            createFloor(-50, 0, 0, 60, 60, matWood); // Français
            createWall(-80, 0, 0, 2, 40, 60, 0x5C4033); 
            createWall(-50, 0, -30, 60, 40, 2, 0x5C4033); 
            createWall(-50, 0, 30, 60, 40, 2, 0x5C4033); 
            const lightFR = new THREE.PointLight(0xffddaa, 0.8, 100);
            lightFR.position.set(-50, 20, 0); scene.add(lightFR);
            createInteractableObject(-65, 0, -10, "Dissertation Français", "bac_dissert_francais.html", 0xffd700);

            createFloor(50, 0, 0, 60, 60, matScience); // Maths
            createWall(80, 0, 0, 2, 40, 60, 0x2c3e50); 
            createWall(50, 0, -30, 60, 40, 2, 0x2c3e50); 
            createWall(50, 0, 30, 60, 40, 2, 0x2c3e50); 
            const lightMath = new THREE.PointLight(0x00ffff, 0.8, 100);
            lightMath.position.set(50, 20, 0); scene.add(lightMath);
            createInteractableObject(65, 0, 10, "Projet Mathématiques", "maths.html", 0x00ffff, true);

            createFloor(0, 0, -80, 80, 60, matMuseum); // Histoire
            createWall(0, 0, -110, 80, 40, 2, 0xF5F5DC); 
            createWall(-40, 0, -80, 2, 40, 60, 0xF5F5DC); 
            createWall(40, 0, -80, 2, 40, 60, 0xF5F5DC); 
            createWall(-30, 0, -50, 20, 40, 2, 0xF5F5DC); 
            createWall(30, 0, -50, 20, 40, 2, 0xF5F5DC);
            const lightHist = new THREE.PointLight(0xffffff, 0.8, 100);
            lightHist.position.set(0, 20, -80); scene.add(lightHist);
            createInteractableObject(0, 0, -95, "Exposé d'Histoire", "histoire.html", 0xe67e22);

            // --- SYSTÈME D'ESCALIERS ---
            for(let i=0; i<20; i++) {
                let sX = 13; 
                let sZ = 30 - i * 1.5; // Monte vers Z=1.5
                let sY = i * 2; 
                
                const stepMesh = new THREE.Mesh(new THREE.BoxGeometry(10, 2, 1.5), matWood);
                stepMesh.position.set(sX, sY + 1, sZ);
                scene.add(stepMesh);
                
                floors.push({ minX: sX - 5, maxX: sX + 5, minZ: sZ - 1.5, maxZ: sZ + 1.5, y: sY + 2 });
            }
            createWall(8, 0, 15, 1, 40, 30, 0xdddddd); // Mur sous l'escalier

            // --- SYSTÈME D'ASCENSEUR (Aligné dans le mur gauche) ---
            createWall(-29, 0, 0, 2, 80, 10, 0x333333); // Fond
            createWall(-24, 0, -5, 10, 80, 2, 0x333333); // Côté Arrière
            createWall(-24, 0, 5, 10, 80, 2, 0x333333); // Côté Avant
            
            elevatorPlatform = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 8), matConcrete);
            elevatorPlatform.position.set(-24, 0, 0);
            scene.add(elevatorPlatform);
            elevatorData = {minX: -28, maxX: -20, minZ: -4, maxZ: 4, y: 0};

            // Boutons d'interaction Ascenseur
            createInteractableObject(-24, 0, 0, "Activer Ascenseur", "#", 0x2ecc71, true, "elevator");
            elevatorBtnObj = interactableObjects[interactableObjects.length - 1]; // Bouton cabine
            
            // Boutons d'appel externes (Accessibles et fixes)
            createInteractableObject(-19, 0, 7, "Appeler (RDC)", "#", 0xe74c3c, true, "call_elevator_0");
            createInteractableObject(-19, 40, 7, "Appeler (2ème)", "#", 0xe74c3c, true, "call_elevator_40");

            // --- LE 2ÈME ÉTAGE : GALERIE D'ART (Y = 40) ---
            // Planchers multiples pour laisser un vrai trou pour l'escalier (X=8 à 18, Z=0 à 10)
            createFloor(0, 40, -25, 40, 50, matWood); // Arrière (X de -20 à 20, Z de -50 à 0)
            createFloor(-6, 40, 5, 28, 10, matWood);  // Avant Gauche (Couvre l'ascenseur)
            createFloor(19, 40, 5, 2, 10, matWood);   // Avant Droite (Petit bout à côté de l'escalier)
            
            // Murs du 2ème
            createWall(0, 40, -50, 40, 30, 2, 0xffffff); // Mur Fond
            createWall(-20, 40, -27.5, 2, 30, 45, 0xffffff); // Mur Gauche Arrière
            createWall(-20, 40, 7.5, 2, 30, 5, 0xffffff); // Mur Gauche Avant (Ferme le couloir de l'ascenseur)
            createWall(20, 40, -20, 2, 30, 60, 0xffffff); // Mur Droit
            
            // Garde-corps en verre autour du grand vide
            createWall(-6, 40, 10, 28, 10, 2, 0x88ccff); // Balcon avant gauche
            createWall(19, 40, 10, 2, 10, 2, 0x88ccff); // Balcon avant droite
            
            // Garde-corps AUTOUR du trou de l'escalier (Pour ne pas tomber)
            createWall(8, 40, 5, 1, 10, 10, 0x88ccff); // Mur gauche de l'escalier
            createWall(18, 40, 5, 1, 10, 10, 0x88ccff); // Mur droit de l'escalier
            createWall(13, 40, 0, 10, 10, 1, 0x88ccff); // Mur arrière de l'escalier (Arrivée)

            const lightArt = new THREE.PointLight(0xffffff, 1, 100);
            lightArt.position.set(0, 60, -20); scene.add(lightArt);
            createInteractableObject(0, 40, -40, "Galerie d'Art", "galerie.html", 0xff66cc);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function onKeyDown( event ) {
            switch ( event.code ) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space':
                    if ( canJump === true ) { velocity.y += 350; canJump = false; }
                    break;
                case 'KeyE': checkInteraction(); break;
            }
        }

        function onKeyUp( event ) {
            switch ( event.code ) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function checkInteraction() {
            if (closestObject && controls.isLocked) {
                
                // Système d'ascenseur intelligent
                if (closestObject.actionType === "elevator") {
                    elevatorTargetY = elevatorTargetY === 0 ? 40 : 0;
                    notificationMsg.innerText = "Ascenseur activé...";
                    notificationMsg.style.backgroundColor = "#2ecc71";
                    notificationMsg.style.display = "block";
                    setTimeout(() => notificationMsg.style.display = "none", 3000);
                    return; 
                } else if (closestObject.actionType === "call_elevator_0") {
                    elevatorTargetY = 0;
                    notificationMsg.innerText = "L'ascenseur descend au RDC...";
                    notificationMsg.style.backgroundColor = "#e74c3c";
                    notificationMsg.style.display = "block";
                    setTimeout(() => notificationMsg.style.display = "none", 3000);
                    return; 
                } else if (closestObject.actionType === "call_elevator_40") {
                    elevatorTargetY = 40;
                    notificationMsg.innerText = "L'ascenseur monte au 2ème...";
                    notificationMsg.style.backgroundColor = "#e74c3c";
                    notificationMsg.style.display = "block";
                    setTimeout(() => notificationMsg.style.display = "none", 3000);
                    return; 
                }

                // Liens vers les autres pages
                controls.unlock();
                console.log("Redirection vers " + closestObject.url + "...");
                window.location.href = closestObject.url;
            }
        }

        function animate() {
            requestAnimationFrame( animate );
            const time = performance.now();
            let delta = ( time - prevTime ) / 1000;
            if ( delta > 0.1 ) delta = 0.1; // Empêche la téléportation après un lag

            // Animation des objets interactifs
            interactableObjects.forEach((obj, index) => {
                obj.mesh.rotation.y += 0.005; // Ralenti pour être lisible
                obj.mesh.position.y = obj.baseY + Math.sin(time * 0.002 + index) * 2;
            });

            if ( controls.isLocked === true ) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize();

                const speed = 400.0;
                if ( moveForward || moveBackward ) velocity.z -= direction.z * speed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * speed * delta;

                const pos = controls.getObject().position;
                const oldX = pos.x;
                const oldZ = pos.z;

                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );

                // A. GESTION DES COLLISIONS (Glissade contre les murs)
                const pr = 2.5; // Rayon du joueur
                
                // Test X
                let testX = pos.x;
                let testZ = oldZ;
                let collideX = false;
                for(let w of walls) {
                    if (pos.y + 2 > w.minY && pos.y - 9 < w.maxY) {
                        if (testX + pr > w.minX && testX - pr < w.maxX && testZ + pr > w.minZ && testZ - pr < w.maxZ) { collideX = true; break; }
                    }
                }
                if (collideX) pos.x = oldX;

                // Test Z
                testX = pos.x; 
                testZ = pos.z;
                let collideZ = false;
                for(let w of walls) {
                    if (pos.y + 2 > w.minY && pos.y - 9 < w.maxY) {
                        if (testX + pr > w.minX && testX - pr < w.maxX && testZ + pr > w.minZ && testZ - pr < w.maxZ) { collideZ = true; break; }
                    }
                }
                if (collideZ) pos.z = oldZ;

                // B. GESTION DE L'ASCENSEUR 
                if (elevatorPlatform) {
                    if (Math.abs(elevatorPlatform.position.y - elevatorTargetY) > 0.1) {
                        const dir = elevatorTargetY > elevatorPlatform.position.y ? 1 : -1;
                        elevatorPlatform.position.y += dir * 15 * delta; 
                    } else {
                        elevatorPlatform.position.y = elevatorTargetY; 
                    }
                    elevatorData.y = elevatorPlatform.position.y;
                    
                    // Le bouton interne monte/descend avec la cabine
                    elevatorBtnObj.baseY = elevatorPlatform.position.y + 5; 
                }

                // C. DÉTECTION DU SOL 
                let floorY = -100; 
                let onElevator = false;

                for (let f of floors) {
                    if (pos.x >= f.minX && pos.x <= f.maxX && pos.z >= f.minZ && pos.z <= f.maxZ) {
                        if (f.y > floorY) floorY = f.y;
                    }
                }
                
                if (pos.x >= elevatorData.minX && pos.x <= elevatorData.maxX && pos.z >= elevatorData.minZ && pos.z <= elevatorData.maxZ) {
                    floorY = elevatorData.y;
                    onElevator = true;
                }

                // D. GRAVITÉ ET DÉPLACEMENTS VERTICAUX
                const targetCameraY = floorY + 10; 

                if (pos.y < targetCameraY) {
                    if (targetCameraY - pos.y < 8) { 
                        pos.y += (targetCameraY - pos.y) * 0.15; // Lissage
                    } else {
                        pos.y = targetCameraY; 
                    }
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;

                } else if (pos.y > targetCameraY) {
                    velocity.y -= 9.8 * 100.0 * delta; // Chute
                    pos.y += velocity.y * delta;
                    
                    if (pos.y <= targetCameraY) {
                        pos.y = targetCameraY;
                        velocity.y = 0;
                        canJump = true;
                    } else if (pos.y - targetCameraY < 2 && !canJump && !onElevator) {
                        pos.y -= (pos.y - targetCameraY) * 0.4;
                        velocity.y = 0;
                        canJump = true;
                    } else {
                        canJump = false; 
                    }
                }

                // E. LOGIQUE DE L'INTERFACE D'INTERACTION
                closestObject = null;
                let minDistance = interactionDistance;
                interactableObjects.forEach(obj => {
                    const distance = pos.distanceTo(obj.mesh.position);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestObject = obj;
                    }
                });

                if (closestObject) {
                    interactionMsg.innerText = "Appuyez sur 'E' pour : " + closestObject.title;
                    interactionMsg.style.display = 'block';
                } else {
                    interactionMsg.style.display = 'none';
                }
            }

            prevTime = time;
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
