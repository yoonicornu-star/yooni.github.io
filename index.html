<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace 3D</title>
    <!-- Chargement de Three.js depuis un CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Empêche le défilement */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Écran d'instructions avant de commencer */
        #instructions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            text-align: center;
            cursor: pointer;
        }

        #instructions h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        #instructions p {
            font-size: 1.2em;
            color: #ccc;
        }

        /* Message d'interaction (Appuyer sur E) */
        #interaction-message {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            display: none; /* Masqué par défaut */
            z-index: 5;
            pointer-events: none; /* Ne bloque pas les clics */
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* Un petit réticule (croix) au centre de l'écran */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 4px; left: 0; width: 10px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 4px; width: 2px; height: 10px;
        }

        /* Style pour les notifications factices lors de l'appui sur E */
        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 20;
            animation: fadeInOut 3s forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="instructions">
        <h1>Mon Home 3D</h1>
        <p>Cliquez pour jouer</p>
        <p style="font-size: 0.9em; margin-top: 20px;">
            ZQSD / Flèches pour se déplacer<br>
            Souris pour regarder<br>
            Échap pour quitter
        </p>
    </div>

    <div id="crosshair"></div>
    <div id="interaction-message">Appuyez sur 'E' pour ouvrir : Dissertation de Français</div>
    <div id="notification">Ouverture de la page GitHub Pages...</div>

    <!-- Conteneur pour le rendu Three.js -->
    <div id="canvas-container"></div>

    <script>
        // Implémentation simplifiée de PointerLockControls intégrée
        // Basée sur le code source de Three.js d'origine
        const PointerLockControls = function ( camera, domElement ) {
            this.domElement = domElement;
            this.isLocked = false;
            
            this.minPolarAngle = 0; // Vue max vers le haut (0 = zénith)
            this.maxPolarAngle = Math.PI; // Vue max vers le bas (PI = nadir)

            const scope = this;
            const changeEvent = { type: 'change' };
            const lockEvent = { type: 'lock' };
            const unlockEvent = { type: 'unlock' };
            
            const euler = new THREE.Euler( 0, 0, 0, 'YXZ' );
            const PI_2 = Math.PI / 2;
            const vec = new THREE.Vector3();

            function onMouseMove( event ) {
                if ( scope.isLocked === false ) return;
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                euler.setFromQuaternion( camera.quaternion );

                euler.y -= movementX * 0.002;
                euler.x -= movementY * 0.002;

                euler.x = Math.max( PI_2 - scope.maxPolarAngle, Math.min( PI_2 - scope.minPolarAngle, euler.x ) );

                camera.quaternion.setFromEuler( euler );
            }

            function onPointerlockChange() {
                if ( document.pointerLockElement === scope.domElement ) {
                    document.addEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = true;
                    // Déclenchement d'un événement global (bidouillage simple)
                    window.dispatchEvent(new Event('controlsLocked'));
                } else {
                    document.removeEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = false;
                    window.dispatchEvent(new Event('controlsUnlocked'));
                }
            }

            function onPointerlockError() {
                console.error( 'PointerLockControls: Impossible d\'acquérir le verrouillage du pointeur' );
            }

            this.connect = function () {
                document.addEventListener( 'pointerlockchange', onPointerlockChange, false );
                document.addEventListener( 'pointerlockerror', onPointerlockError, false );
            };

            this.disconnect = function () {
                document.removeEventListener( 'pointerlockchange', onPointerlockChange, false );
                document.removeEventListener( 'pointerlockerror', onPointerlockError, false );
            };

            this.lock = function () {
                this.domElement.requestPointerLock();
            };

            this.unlock = function () {
                document.exitPointerLock();
            };

            this.getObject = function () { // conserve la caméra pour la compatibilité
                return camera;
            };

            this.getDirection = function () {
                const direction = new THREE.Vector3( 0, 0, - 1 );
                return direction.applyQuaternion( camera.quaternion );
            };

            this.moveForward = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                vec.crossVectors( camera.up, vec );
                camera.position.addScaledVector( vec, distance );
            };

            this.moveRight = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                camera.position.addScaledVector( vec, distance );
            };

            this.connect();
        };

        let camera, scene, renderer, controls;
        
        // Variables pour le mouvement
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Références UI
        const instructions = document.getElementById( 'instructions' );
        const interactionMsg = document.getElementById( 'interaction-message' );
        const notificationMsg = document.getElementById( 'notification' );

        // Gestion de plusieurs salles et objets interactifs
        let interactableObjects = []; // Tableau pour stocker tous les objets
        let closestObject = null;     // Objet le plus proche du joueur
        const interactionDistance = 15; // Distance d'interaction
        const walls = []; // Stockage des murs pour les collisions

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. SCÈNE
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x87CEEB ); // Ciel bleu clair
            scene.fog = new THREE.Fog( 0xffffff, 0, 750 ); // Brouillard pour la profondeur

            // 2. LUMIÈRES
            const light = new THREE.HemisphereLight( 0xeeeeff, 0x777788, 0.75 );
            light.position.set( 0.5, 1, 0.75 );
            scene.add( light );

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(20, 50, 20);
            scene.add(directionalLight);

            // 3. CAMÉRA
            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.y = 10; // Hauteur des yeux

            // 4. CONTRÔLES
            controls = new PointerLockControls( camera, document.body );
            
            // Gestion de l'affichage des instructions
            instructions.addEventListener( 'click', function () {
                controls.lock();
            });

            window.addEventListener('controlsLocked', () => {
                instructions.style.display = 'none';
            });

            window.addEventListener('controlsUnlocked', () => {
                instructions.style.display = 'flex';
                // Cacher le message d'interaction si on met en pause
                interactionMsg.style.display = 'none'; 
            });

            // 5. ENVIRONNEMENT MULTI-SALLES
            createEnvironment();

            // 6. RENDERER
            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            // 7. ÉVÉNEMENTS
            window.addEventListener( 'resize', onWindowResize );
            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );
        }

        // --- FONCTIONS DE CONSTRUCTION DU NIVEAU ---
        function createWall(x, z, width, depth, color) {
            const geometry = new THREE.BoxGeometry(width, 30, depth);
            const material = new THREE.MeshLambertMaterial({ color: color });
            const wall = new THREE.Mesh(geometry, material);
            wall.position.set(x, 15, z);
            scene.add(wall);
            // On enregistre les coordonnées du mur pour la gestion des collisions
            walls.push({
                minX: x - width/2, maxX: x + width/2,
                minZ: z - depth/2, maxZ: z + depth/2
            });
        }

        function createFloor(x, z, width, depth, material) {
            const geometry = new THREE.PlaneGeometry(width, depth);
            const floor = new THREE.Mesh(geometry, material);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(x, 0, z);
            scene.add(floor);
        }

        function createInteractableObject(x, z, title, url, color, isCube=false) {
            // Création d'une texture avec Canvas pour l'aperçu du texte
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 700;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f9f9f9'; ctx.fillRect(0, 0, 512, 700);
            ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center'; ctx.fillText(title, 256, 80);
            ctx.fillStyle = '#7f8c8d'; ctx.textAlign = 'left'; ctx.font = '22px sans-serif';
            ctx.fillText('Cliquez (E) pour lire...', 40, 150);
            for(let i=0; i<12; i++) {
                ctx.fillRect(40, 180 + i * 35, 432 - (Math.random() * 100), 15);
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            const frontMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.8 });
            const coverMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.5 });
            
            let geometry, materials;
            if (isCube) {
                geometry = new THREE.BoxGeometry(5, 5, 5); // Style Mathématiques (cube)
                materials = [coverMat, coverMat, coverMat, coverMat, frontMat, coverMat];
            } else {
                geometry = new THREE.BoxGeometry(4, 6, 0.5); // Style Page normale
                materials = [coverMat, coverMat, coverMat, coverMat, frontMat, coverMat];
            }
            
            const mesh = new THREE.Mesh(geometry, materials);
            mesh.position.set(x, 10, z);
            scene.add(mesh);
            
            // Petit socle d'exposition
            const base = new THREE.Mesh(new THREE.CylinderGeometry(3, 4, 2, 16), new THREE.MeshLambertMaterial({color: 0x333333}));
            base.position.set(x, 1, z);
            scene.add(base);

            // On ajoute cet objet à la liste des interactions possibles
            interactableObjects.push({ mesh: mesh, title: title, url: url });
        }

        function createEnvironment() {
            // -- TEXTURES ET MATÉRIAUX --
            const canvasChecker = document.createElement('canvas');
            canvasChecker.width = 128; canvasChecker.height = 128;
            const ctxC = canvasChecker.getContext('2d');
            ctxC.fillStyle = '#ffffff'; ctxC.fillRect(0, 0, 128, 128);
            ctxC.fillStyle = '#bdc3c7'; ctxC.fillRect(0, 0, 64, 64); ctxC.fillRect(64, 64, 64, 64);
            const texChecker = new THREE.CanvasTexture(canvasChecker);
            texChecker.wrapS = THREE.RepeatWrapping; texChecker.wrapT = THREE.RepeatWrapping;
            texChecker.repeat.set(5, 10);

            const matHallway = new THREE.MeshLambertMaterial({ map: texChecker });
            const matWood = new THREE.MeshLambertMaterial({ color: 0x8B5A2B }); // Sol bois
            const matScience = new THREE.MeshLambertMaterial({ color: 0x111111 }); // Sol sombre
            const matMuseum = new THREE.MeshLambertMaterial({ color: 0x8B0000 }); // Tapis rouge

            // --- 1. COULOIR CENTRAL (Point de départ) ---
            createFloor(0, 0, 40, 100, matHallway);
            createWall(0, 50, 40, 2, 0x7f8c8d); // Mur de derrière fermé
            
            // Murs Ouest (avec une ouverture au milieu pour le Français)
            createWall(-20, 30, 2, 40, 0x7f8c8d);
            createWall(-20, -30, 2, 40, 0x7f8c8d);
            
            // Murs Est (avec une ouverture au milieu pour les Maths)
            createWall(20, 30, 2, 40, 0x7f8c8d);
            createWall(20, -30, 2, 40, 0x7f8c8d);

            // --- 2. SALLE FRANÇAIS (Ouest) : Thème Bibliothèque ---
            createFloor(-50, 0, 60, 60, matWood);
            createWall(-80, 0, 2, 60, 0x5C4033); // Mur du fond
            createWall(-50, -30, 60, 2, 0x5C4033); // Mur nord
            createWall(-50, 30, 60, 2, 0x5C4033); // Mur sud
            
            const lightFR = new THREE.PointLight(0xffddaa, 0.8, 100);
            lightFR.position.set(-50, 20, 0); scene.add(lightFR);
            
            createInteractableObject(-65, -10, "Dissertation Français", "bac_dissert_francais.html", 0xffd700);


            // --- 3. SALLE MATHS/SCIENCES (Est) : Thème Labo ---
            createFloor(50, 0, 60, 60, matScience);
            createWall(80, 0, 2, 60, 0x2c3e50); // Mur du fond
            createWall(50, -30, 60, 2, 0x2c3e50); // Mur nord
            createWall(50, 30, 60, 2, 0x2c3e50); // Mur sud
            
            const lightMath = new THREE.PointLight(0x00ffff, 0.8, 100);
            lightMath.position.set(50, 20, 0); scene.add(lightMath);
            
            createInteractableObject(65, 10, "Projet Mathématiques", "maths.html", 0x00ffff, true);


            // --- 4. SALLE HISTOIRE (Nord) : Thème Musée ---
            createFloor(0, -80, 80, 60, matMuseum);
            createWall(0, -110, 80, 2, 0xF5F5DC); // Mur du fond
            createWall(-40, -80, 2, 60, 0xF5F5DC); // Mur ouest
            createWall(40, -80, 2, 60, 0xF5F5DC); // Mur est
            
            // Mur avec une grande porte
            createWall(-30, -50, 20, 2, 0xF5F5DC);
            createWall(30, -50, 20, 2, 0xF5F5DC);
            
            const lightHist = new THREE.PointLight(0xffffff, 0.8, 100);
            lightHist.position.set(0, 20, -80); scene.add(lightHist);
            
            createInteractableObject(0, -95, "Exposé d'Histoire", "histoire.html", 0xe67e22);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function onKeyDown( event ) {
            switch ( event.code ) {
                case 'ArrowUp':
                case 'KeyW':
                    moveForward = true;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                case 'KeyQ': // Pour claviers AZERTY
                    moveLeft = true;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveBackward = true;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveRight = true;
                    break;
                case 'Space':
                    if ( canJump === true ) velocity.y += 350; // Force du saut
                    canJump = false;
                    break;
                case 'KeyE':
                    checkInteraction();
                    break;
            }
        }

        function onKeyUp( event ) {
            switch ( event.code ) {
                case 'ArrowUp':
                case 'KeyW':
                    moveForward = false;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                case 'KeyQ':
                    moveLeft = false;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveBackward = false;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveRight = false;
                    break;
            }
        }

        function checkInteraction() {
            if (closestObject && controls.isLocked) {
                // L'utilisateur a appuyé sur E en étant près d'un des objets
                controls.unlock();
                console.log("Redirection vers " + closestObject.url + "...");
                window.location.href = closestObject.url;
            }
        }

        function animate() {
            requestAnimationFrame( animate );

            const time = performance.now();

            // 1. ANIMATION DES OBJETS INTERACTIFS
            interactableObjects.forEach((obj, index) => {
                obj.mesh.rotation.y += 0.005;
                // Flottement asynchrone pour chaque objet
                obj.mesh.position.y = 10 + Math.sin(time * 0.002 + index) * 2;
            });

            // 2. GESTION DU DÉPLACEMENT AVEC COLLISIONS
            if ( controls.isLocked === true ) {
                let delta = ( time - prevTime ) / 1000;
                if ( delta > 0.1 ) delta = 0.1;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; 

                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize();

                const speed = 400.0;
                if ( moveForward || moveBackward ) velocity.z -= direction.z * speed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * speed * delta;

                // Position avant déplacement
                const pos = controls.getObject().position;
                const oldX = pos.x;
                const oldZ = pos.z;

                // Application du mouvement
                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );
                pos.y += ( velocity.y * delta );

                // Vérification des murs (Rayon de collision = 2)
                const pr = 2; 
                let collideX = false;
                let collideZ = false;

                for(let w of walls) {
                    // Test collision sur l'axe X
                    if (pos.x + pr > w.minX && pos.x - pr < w.maxX && oldZ + pr > w.minZ && oldZ - pr < w.maxZ) {
                        collideX = true;
                    }
                    // Test collision sur l'axe Z
                    if (oldX + pr > w.minX && oldX - pr < w.maxX && pos.z + pr > w.minZ && pos.z - pr < w.maxZ) {
                        collideZ = true;
                    }
                }

                // Annuler le mouvement si on rentre dans un mur
                if (collideX) pos.x = oldX;
                if (collideZ) pos.z = oldZ;

                // Gravité et sol
                if ( pos.y < 10 ) {
                    velocity.y = 0;
                    pos.y = 10;
                    canJump = true;
                }
                
                // On limite l'arrière pour ne pas tomber dans le vide au point d'apparition
                if (pos.z > 48) pos.z = 48;


                // 3. LOGIQUE DE DISTANCE POUR LE MENU
                closestObject = null;
                let minDistance = interactionDistance;

                // On cherche l'objet le plus proche du joueur
                interactableObjects.forEach(obj => {
                    const distance = pos.distanceTo(obj.mesh.position);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestObject = obj;
                    }
                });

                if (closestObject) {
                    interactionMsg.innerText = "Appuyez sur 'E' pour ouvrir : " + closestObject.title;
                    interactionMsg.style.display = 'block';
                } else {
                    interactionMsg.style.display = 'none';
                }
            }

            prevTime = time;

            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
