<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace 3D</title>
    <!-- Chargement de Three.js depuis un CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Empêche le défilement */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Écran d'instructions avant de commencer */
        #instructions {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
            text-align: center;
            cursor: pointer;
        }

        #instructions h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        #instructions p {
            font-size: 1.2em;
            color: #ccc;
        }

        /* Message d'interaction (Appuyer sur E) */
        #interaction-message {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            display: none; /* Masqué par défaut */
            z-index: 5;
            pointer-events: none; /* Ne bloque pas les clics */
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* Un petit réticule (croix) au centre de l'écran */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 4px; left: 0; width: 10px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 4px; width: 2px; height: 10px;
        }

        /* Style pour les notifications factices lors de l'appui sur E */
        #notification {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 20;
            animation: fadeInOut 3s forwards;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="instructions">
        <h1>Mon Home 3D</h1>
        <p>Cliquez pour jouer</p>
        <p style="font-size: 0.9em; margin-top: 20px;">
            ZQSD / Flèches pour se déplacer<br>
            Souris pour regarder<br>
            Échap pour quitter
        </p>
    </div>

    <div id="crosshair"></div>
    <div id="interaction-message">Appuyez sur 'E' pour ouvrir : Dissertation de Français</div>
    <div id="notification">Ouverture de la page GitHub Pages...</div>

    <!-- Conteneur pour le rendu Three.js -->
    <div id="canvas-container"></div>

    <script>
        // Implémentation simplifiée de PointerLockControls intégrée
        // Basée sur le code source de Three.js d'origine
        const PointerLockControls = function ( camera, domElement ) {
            this.domElement = domElement;
            this.isLocked = false;
            
            this.minPolarAngle = 0; // Vue max vers le haut (0 = zénith)
            this.maxPolarAngle = Math.PI; // Vue max vers le bas (PI = nadir)

            const scope = this;
            const changeEvent = { type: 'change' };
            const lockEvent = { type: 'lock' };
            const unlockEvent = { type: 'unlock' };
            
            const euler = new THREE.Euler( 0, 0, 0, 'YXZ' );
            const PI_2 = Math.PI / 2;
            const vec = new THREE.Vector3();

            function onMouseMove( event ) {
                if ( scope.isLocked === false ) return;
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;

                euler.setFromQuaternion( camera.quaternion );

                euler.y -= movementX * 0.002;
                euler.x -= movementY * 0.002;

                euler.x = Math.max( PI_2 - scope.maxPolarAngle, Math.min( PI_2 - scope.minPolarAngle, euler.x ) );

                camera.quaternion.setFromEuler( euler );
            }

            function onPointerlockChange() {
                if ( document.pointerLockElement === scope.domElement ) {
                    document.addEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = true;
                    // Déclenchement d'un événement global (bidouillage simple)
                    window.dispatchEvent(new Event('controlsLocked'));
                } else {
                    document.removeEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = false;
                    window.dispatchEvent(new Event('controlsUnlocked'));
                }
            }

            function onPointerlockError() {
                console.error( 'PointerLockControls: Impossible d\'acquérir le verrouillage du pointeur' );
            }

            this.connect = function () {
                document.addEventListener( 'pointerlockchange', onPointerlockChange, false );
                document.addEventListener( 'pointerlockerror', onPointerlockError, false );
            };

            this.disconnect = function () {
                document.removeEventListener( 'pointerlockchange', onPointerlockChange, false );
                document.removeEventListener( 'pointerlockerror', onPointerlockError, false );
            };

            this.lock = function () {
                this.domElement.requestPointerLock();
            };

            this.unlock = function () {
                document.exitPointerLock();
            };

            this.getObject = function () { // conserve la caméra pour la compatibilité
                return camera;
            };

            this.getDirection = function () {
                const direction = new THREE.Vector3( 0, 0, - 1 );
                return direction.applyQuaternion( camera.quaternion );
            };

            this.moveForward = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                vec.crossVectors( camera.up, vec );
                camera.position.addScaledVector( vec, distance );
            };

            this.moveRight = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 );
                camera.position.addScaledVector( vec, distance );
            };

            this.connect();
        };

        let camera, scene, renderer, controls;
        
        // Variables pour le mouvement
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Références UI
        const instructions = document.getElementById( 'instructions' );
        const interactionMsg = document.getElementById( 'interaction-message' );
        const notificationMsg = document.getElementById( 'notification' );

        // La "page" interactive
        let interactableObject;
        let isNearObject = false;
        const interactionDistance = 15; // Distance à laquelle l'interaction est possible

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. SCÈNE
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0x87CEEB ); // Ciel bleu clair
            scene.fog = new THREE.Fog( 0xffffff, 0, 750 ); // Brouillard pour la profondeur

            // 2. LUMIÈRES
            const light = new THREE.HemisphereLight( 0xeeeeff, 0x777788, 0.75 );
            light.position.set( 0.5, 1, 0.75 );
            scene.add( light );

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(20, 50, 20);
            scene.add(directionalLight);

            // 3. CAMÉRA
            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 1000 );
            camera.position.y = 10; // Hauteur des yeux

            // 4. CONTRÔLES
            controls = new PointerLockControls( camera, document.body );
            
            // Gestion de l'affichage des instructions
            instructions.addEventListener( 'click', function () {
                controls.lock();
            });

            window.addEventListener('controlsLocked', () => {
                instructions.style.display = 'none';
            });

            window.addEventListener('controlsUnlocked', () => {
                instructions.style.display = 'flex';
                // Cacher le message d'interaction si on met en pause
                interactionMsg.style.display = 'none'; 
            });

            // 5. ENVIRONNEMENT (Le Home)
            createEnvironment();

            // 6. RENDERER
            renderer = new THREE.WebGLRenderer( { antialias: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            // 7. ÉVÉNEMENTS
            window.addEventListener( 'resize', onWindowResize );
            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );
        }

        function createEnvironment() {
            // -- LE SOL --
            const floorGeometry = new THREE.PlaneGeometry( 200, 200, 10, 10 );
            // Création d'un motif simple type damier
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const context = canvas.getContext('2d');
            context.fillStyle = '#ffffff';
            context.fillRect(0, 0, 128, 128);
            context.fillStyle = '#e0e0e0';
            context.fillRect(0, 0, 64, 64);
            context.fillRect(64, 64, 64, 64);
            
            const floorTexture = new THREE.CanvasTexture(canvas);
            floorTexture.wrapS = THREE.RepeatWrapping;
            floorTexture.wrapT = THREE.RepeatWrapping;
            floorTexture.repeat.set( 50, 50 );

            const floorMaterial = new THREE.MeshLambertMaterial({ map: floorTexture });
            const floor = new THREE.Mesh( floorGeometry, floorMaterial );
            floor.rotation.x = - Math.PI / 2; // Coucher le plan pour faire un sol
            scene.add( floor );

            // -- QUELQUES MURS POUR DÉLIMITER --
            const wallMaterial = new THREE.MeshLambertMaterial( { color: 0x90a4ae } ); // Gris bleu
            
            // Mur Nord
            const wallN = new THREE.Mesh( new THREE.BoxGeometry( 100, 30, 2 ), wallMaterial );
            wallN.position.set( 0, 15, -50 );
            scene.add( wallN );
            
            // Mur Sud
            const wallS = new THREE.Mesh( new THREE.BoxGeometry( 100, 30, 2 ), wallMaterial );
            wallS.position.set( 0, 15, 50 );
            scene.add( wallS );

            // Mur Est
            const wallE = new THREE.Mesh( new THREE.BoxGeometry( 2, 30, 100 ), wallMaterial );
            wallE.position.set( 50, 15, 0 );
            scene.add( wallE );

            // Mur Ouest
            const wallW = new THREE.Mesh( new THREE.BoxGeometry( 2, 30, 100 ), wallMaterial );
            wallW.position.set( -50, 15, 0 );
            scene.add( wallW );

            // -- DÉCORS (Quelques colonnes) --
            const columnGeo = new THREE.CylinderGeometry( 2, 2, 30, 16 );
            const columnMat = new THREE.MeshLambertMaterial( { color: 0xffffff } );
            const positions = [ [-30,-30], [30,-30], [-30,30], [30,30] ];
            positions.forEach(pos => {
                const col = new THREE.Mesh(columnGeo, columnMat);
                col.position.set(pos[0], 15, pos[1]);
                scene.add(col);
            });

            // -- L'OBJET INTERACTIF (La "Page" avec aperçu) --
            // 1. Création d'une texture avec Canvas pour l'aperçu du texte
            const pageCanvas = document.createElement('canvas');
            pageCanvas.width = 512;
            pageCanvas.height = 700;
            const ctx = pageCanvas.getContext('2d');
            
            // Fond blanc (papier)
            ctx.fillStyle = '#f9f9f9';
            ctx.fillRect(0, 0, 512, 700);
            
            // Titre de la page
            ctx.fillStyle = '#2c3e50';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Dissertation de Français', 256, 80);
            
            // Faux texte pour donner l'illusion d'une page remplie
            ctx.fillStyle = '#7f8c8d';
            ctx.textAlign = 'left';
            ctx.font = '22px sans-serif';
            ctx.fillText('Introduction :', 40, 150);
            
            for(let i=0; i<12; i++) {
                // Lignes de texte générées sous forme de petits rectangles
                ctx.fillRect(40, 180 + i * 35, 432 - (Math.random() * 100), 15);
            }
            
            const pageTexture = new THREE.CanvasTexture(pageCanvas);

            // 2. Création de la géométrie et des matériaux
            const intGeo = new THREE.BoxGeometry( 4, 6, 0.5 ); // Forme d'une page
            
            // Matériau doré pour la couverture/dos
            const coverMat = new THREE.MeshStandardMaterial( { 
                color: 0xffd700, emissive: 0x332200, roughness: 0.2, metalness: 0.8
            } );
            
            // Matériau avec notre aperçu textuel pour la face avant
            const frontMat = new THREE.MeshStandardMaterial( { 
                map: pageTexture, roughness: 0.8, metalness: 0.1
            } );

            // Ordre des faces dans ThreeJS BoxGeometry : Droite, Gauche, Haut, Bas, Avant, Arrière
            const materials = [ coverMat, coverMat, coverMat, coverMat, frontMat, coverMat ];
            
            interactableObject = new THREE.Mesh( intGeo, materials );
            // Positionner au centre, un peu au fond
            interactableObject.position.set( 0, 10, -20 ); 
            scene.add( interactableObject );

            // Petit socle en dessous
            const base = new THREE.Mesh( new THREE.CylinderGeometry(3, 4, 2, 16), new THREE.MeshLambertMaterial({color: 0x333333}) );
            base.position.set(0, 1, -20);
            scene.add(base);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function onKeyDown( event ) {
            switch ( event.code ) {
                case 'ArrowUp':
                case 'KeyW':
                    moveForward = true;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                case 'KeyQ': // Pour claviers AZERTY
                    moveLeft = true;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveBackward = true;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveRight = true;
                    break;
                case 'Space':
                    if ( canJump === true ) velocity.y += 350; // Force du saut
                    canJump = false;
                    break;
                case 'KeyE':
                    checkInteraction();
                    break;
            }
        }

        function onKeyUp( event ) {
            switch ( event.code ) {
                case 'ArrowUp':
                case 'KeyW':
                    moveForward = false;
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                case 'KeyQ':
                    moveLeft = false;
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    moveBackward = false;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveRight = false;
                    break;
            }
        }

        function checkInteraction() {
            if (isNearObject && controls.isLocked) {
                // L'utilisateur a appuyé sur E et est assez proche
                
                // 1. On déverrouille la souris pour pouvoir utiliser la nouvelle page
                controls.unlock();

                // 2. Optionnel : Petit effet visuel flash blanc juste avant de partir
                interactableObject.material.emissive.setHex(0xffffff);

                // 3. REDIRECTION VERS LA NOUVELLE PAGE (Votre dissertation)
                // On met à jour le lien pour pointer vers votre fichier
                window.location.href = 'bac_dissert_francais.html';
            }
        }

        function animate() {
            requestAnimationFrame( animate );

            const time = performance.now();

            // 1. ANIMATION DES OBJETS
            if (interactableObject) {
                // Fait tourner l'objet sur lui-même (vitesse réduite pour mieux lire le titre)
                interactableObject.rotation.y += 0.005;
                // Le fait flotter un peu de haut en bas
                interactableObject.position.y = 10 + Math.sin(time * 0.002) * 2;
            }

            // 2. GESTION DU DÉPLACEMENT
            if ( controls.isLocked === true ) {
                // Calcul du delta de temps en secondes
                const delta = ( time - prevTime ) / 1000;

                // Friction / ralentissement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // Gravité

                // Vecteurs de direction basés sur les entrées clavier
                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize(); // Normaliser pour une vitesse constante en diagonale

                // Application de la vitesse
                const speed = 400.0;
                if ( moveForward || moveBackward ) velocity.z -= direction.z * speed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * speed * delta;

                // Application du mouvement à la caméra via les contrôles
                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );
                
                // Gestion de la hauteur et du sol (Saut basique)
                controls.getObject().position.y += ( velocity.y * delta );

                if ( controls.getObject().position.y < 10 ) {
                    // Si on touche le sol
                    velocity.y = 0;
                    controls.getObject().position.y = 10; // Hauteur des yeux fixée à 10
                    canJump = true;
                }

                // GESTION DES COLLISIONS BASIQUES (limites de la pièce)
                // Pour éviter de traverser les murs
                const pos = controls.getObject().position;
                if (pos.x < -48) pos.x = -48;
                if (pos.x > 48) pos.x = 48;
                if (pos.z < -48) pos.z = -48;
                if (pos.z > 48) pos.z = 48;


                // 3. LOGIQUE DE DISTANCE POUR L'INTERACTION
                // Calculer la distance entre la caméra (le joueur) et l'objet
                if (interactableObject) {
                    const distance = pos.distanceTo(interactableObject.position);
                    
                    if (distance < interactionDistance) {
                        if (!isNearObject) {
                            isNearObject = true;
                            interactionMsg.style.display = 'block'; // Afficher le message E
                        }
                    } else {
                        if (isNearObject) {
                            isNearObject = false;
                            interactionMsg.style.display = 'none'; // Cacher le message
                        }
                    }
                }
            }

            prevTime = time;

            // Rendu de la scène
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
