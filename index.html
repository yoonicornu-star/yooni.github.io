<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Espace 3D Moderne</title>
    <!-- Chargement de Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f5f9;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #instructions {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(20,30,40,0.8) 0%, rgba(0,0,0,0.95) 100%);
            color: white; z-index: 10; text-align: center; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #instructions h1 { font-size: 4em; margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }
        #instructions p { font-size: 1.2em; color: #aaa; font-weight: 300; }
        
        .keys {
            display: flex; gap: 20px; margin-top: 30px;
        }
        .key-group {
            background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #interaction-message {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 20px; font-weight: 400;
            background: rgba(0, 0, 0, 0.7); padding: 12px 30px; border-radius: 30px;
            display: none; z-index: 5; pointer-events: none;
            letter-spacing: 1px; border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 5; pointer-events: none; mix-blend-mode: difference;
        }

        #notification {
            position: absolute; top: 20px; right: 20px; background-color: #2ecc71; color: white;
            padding: 15px 25px; border-radius: 8px; font-weight: bold; display: none;
            z-index: 20; animation: slideIn 0.5s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>M U S É E &nbsp; 3 D</h1>
        <p>Cliquez pour entrer</p>
        <div class="keys">
            <div class="key-group"><b>ZQSD</b> / <b>Flèches</b><br>Se déplacer</div>
            <div class="key-group"><b>Souris</b><br>Regarder</div>
            <div class="key-group"><b>Espace</b><br>Sauter</div>
            <div class="key-group"><b>E</b><br>Interagir</div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="interaction-message">Appuyez sur 'E'</div>
    <div id="notification">Action en cours...</div>
    <div id="canvas-container"></div>

    <script>
        const PointerLockControls = function ( camera, domElement ) {
            this.domElement = domElement;
            this.isLocked = false;
            this.minPolarAngle = 0; 
            this.maxPolarAngle = Math.PI; 
            const scope = this;
            const euler = new THREE.Euler( 0, 0, 0, 'YXZ' );
            const PI_2 = Math.PI / 2;
            const vec = new THREE.Vector3();

            function onMouseMove( event ) {
                if ( scope.isLocked === false ) return;
                const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
                euler.setFromQuaternion( camera.quaternion );
                euler.y -= movementX * 0.002;
                euler.x -= movementY * 0.002;
                euler.x = Math.max( PI_2 - scope.maxPolarAngle, Math.min( PI_2 - scope.minPolarAngle, euler.x ) );
                camera.quaternion.setFromEuler( euler );
            }

            function onPointerlockChange() {
                if ( document.pointerLockElement === scope.domElement ) {
                    document.addEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = true; window.dispatchEvent(new Event('controlsLocked'));
                } else {
                    document.removeEventListener( 'mousemove', onMouseMove, false );
                    scope.isLocked = false; window.dispatchEvent(new Event('controlsUnlocked'));
                }
            }
            this.connect = function () { document.addEventListener( 'pointerlockchange', onPointerlockChange, false ); };
            this.disconnect = function () { document.removeEventListener( 'pointerlockchange', onPointerlockChange, false ); };
            this.lock = function () { this.domElement.requestPointerLock(); };
            this.unlock = function () { document.exitPointerLock(); };
            this.getObject = function () { return camera; };
            this.moveForward = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 ); vec.crossVectors( camera.up, vec ); camera.position.addScaledVector( vec, distance );
            };
            this.moveRight = function ( distance ) {
                vec.setFromMatrixColumn( camera.matrix, 0 ); camera.position.addScaledVector( vec, distance );
            };
            this.connect();
        };

        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const instructions = document.getElementById( 'instructions' );
        const interactionMsg = document.getElementById( 'interaction-message' );
        const notificationMsg = document.getElementById( 'notification' );

        let interactableObjects = []; 
        let closestObject = null;     
        const interactionDistance = 15; 
        
        // Structure de physique repensée
        const walls = [];  
        const floors = []; 

        let elevatorPlatform, elevatorData;

        // Matériaux modernes avec gestion des ombres
        let matWhite, matDark, matWood, matGlass, matAccent;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color( 0xe0eaf5 ); 
            scene.fog = new THREE.Fog( 0xe0eaf5, 50, 300 ); 

            // Éclairage esthétique
            const hemiLight = new THREE.HemisphereLight( 0xffffff, 0x444455, 0.6 );
            hemiLight.position.set( 0, 100, 0 );
            scene.add( hemiLight );

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 300;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            scene.add(dirLight);

            camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 0.5, 1000 );
            camera.position.set(0, 10, 40); // Entrée du musée

            controls = new PointerLockControls( camera, document.body );
            instructions.addEventListener( 'click', () => controls.lock() );
            window.addEventListener('controlsLocked', () => instructions.style.display = 'none');
            window.addEventListener('controlsUnlocked', () => { instructions.style.display = 'flex'; interactionMsg.style.display = 'none'; });

            initMaterials();
            createArchitecture();
            createArtAndInteractions();

            renderer = new THREE.WebGLRenderer( { antialias: true, powerPreference: "high-performance" } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild( renderer.domElement );

            window.addEventListener( 'resize', onWindowResize );
            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );
        }

        function initMaterials() {
            matWhite = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.9 });
            matDark = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
            matWood = new THREE.MeshStandardMaterial({ color: 0xd6a87c, roughness: 0.6 });
            matAccent = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.3 });
            matGlass = new THREE.MeshStandardMaterial({ 
                color: 0x88ccff, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.5, side: THREE.DoubleSide 
            });
        }

        // Crée un bloc solide (sol + plafond + murs autour)
        function createPlatform(x, y, z, width, depth, thickness, material) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, thickness, depth), material);
            mesh.position.set(x, y - thickness/2, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            scene.add(mesh);
            
            // Surface praticable sur le dessus
            floors.push({ minX: x - width/2, maxX: x + width/2, minZ: z - depth/2, maxZ: z + depth/2, y: y });
            // Surface de plafond en dessous
            floors.push({ minX: x - width/2, maxX: x + width/2, minZ: z - depth/2, maxZ: z + depth/2, y: y - thickness });
            // Murs bloquants sur les côtés
            walls.push({ minX: x - width/2, maxX: x + width/2, minY: y - thickness, maxY: y, minZ: z - depth/2, maxZ: z + depth/2 });
        }

        // Crée un mur standard
        function createWall(x, y, z, width, height, depth, material) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
            mesh.position.set(x, y + height/2, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            scene.add(mesh);
            
            // Collision (seulement si ce n'est pas du verre pour qu'on puisse pas passer, mais le verre bloque aussi)
            walls.push({ minX: x - width/2, maxX: x + width/2, minY: y, maxY: y + height, minZ: z - depth/2, maxZ: z + depth/2 });
        }

        function createArchitecture() {
            // RDC : Grand plancher en bois
            createPlatform(0, 0, 0, 100, 100, 2, matWood);

            // Murs extérieurs du bâtiment
            createWall(0, 0, -50, 100, 60, 2, matWhite); // Fond
            createWall(0, 0, 50, 100, 60, 2, matWhite);  // Façade (avec entrée virtuelle)
            createWall(-50, 0, 0, 2, 60, 100, matWhite); // Gauche
            createWall(50, 0, 0, 2, 60, 100, matWhite);  // Droite

            // --- 2ÈME ÉTAGE : Mezzanine en U ---
            // Aile gauche
            createPlatform(-30, 25, 0, 40, 100, 2, matWood);
            // Aile droite
            createPlatform(30, 25, 0, 40, 100, 2, matWood);
            // Pont de liaison au fond
            createPlatform(0, 25, -35, 20, 30, 2, matWood);

            // Garde-corps en verre autour de l'atrium
            createWall(-10, 25, 0, 0.5, 4, 100, matGlass); // Bord aile gauche
            createWall(10, 25, 0, 0.5, 4, 100, matGlass);  // Bord aile droite
            createWall(0, 25, -20, 20, 4, 0.5, matGlass);  // Bord pont arrière

            // --- LE GRAND ESCALIER CENTRAL ---
            const stepCount = 25;
            const stepHeight = 25 / stepCount; // 1 unité de haut
            const stepDepth = 20 / stepCount;  // 0.8 unité de profondeur
            
            for(let i=0; i<stepCount; i++) {
                let sY = (i + 1) * stepHeight;
                let sZ = 15 - (i * stepDepth); // Monte vers le fond (de Z=15 à Z=-5)
                createPlatform(0, sY, sZ, 12, stepDepth, sY, matDark); 
            }
            // Garde-corps de l'escalier
            createWall(-6, 0, 5, 0.5, 30, 20, matGlass);
            createWall(6, 0, 5, 0.5, 30, 20, matGlass);

            // --- ASCENSEUR ---
            // Cage (Aile droite, à l'avant)
            createWall(40, 0, 40, 10, 60, 2, matWhite); // Fond cage
            createWall(35, 0, 35, 2, 60, 10, matWhite); // Mur gauche cage
            createWall(45, 0, 35, 2, 60, 10, matWhite); // Mur droit cage
            
            elevatorData = { x: 40, z: 35, w: 8, d: 8, y: 0, targetY: 0 };
            elevatorPlatform = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 8), matAccent);
            elevatorPlatform.position.set(elevatorData.x, 0, elevatorData.z);
            elevatorPlatform.receiveShadow = true;
            scene.add(elevatorPlatform);
        }

        function createArtAndInteractions() {
            // Fonction utilitaire pour générer des tableaux
            function addPainting(x, y, z, title, link, color, rotY) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(8, 12, 0.5), new THREE.MeshStandardMaterial({color: color, roughness: 0.2, metalness: 0.8}));
                mesh.position.set(x, y + 8, z);
                mesh.rotation.y = rotY;
                mesh.castShadow = true; scene.add(mesh);

                const spotLight = new THREE.PointLight(color, 1.5, 30);
                spotLight.position.set(x, y + 15, z > 0 ? z-5 : z+5);
                scene.add(spotLight);

                interactableObjects.push({ mesh: mesh, baseY: y + 8, title: title, url: link, actionType: "link" });
            }

            // RDC
            addPainting(-49, 0, 0, "Dissertation Français", "bac_dissert_francais.html", 0x3498db, Math.PI/2);
            addPainting(49, 0, 0, "Projet Mathématiques", "maths.html", 0x9b59b6, -Math.PI/2);
            
            // 2ème Étage
            addPainting(0, 25, -49, "Exposé Histoire", "histoire.html", 0xf1c40f, 0);
            addPainting(-49, 25, -30, "Galerie d'Art", "galerie.html", 0xe67e22, Math.PI/2);

            // Boutons de l'ascenseur
            function addBtn(x, y, z, title, action) {
                const btn = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xe74c3c, emissive: 0x550000}));
                btn.position.set(x, y+3, z);
                scene.add(btn);
                interactableObjects.push({ mesh: btn, baseY: y+3, title: title, url: "#", actionType: action });
                return btn;
            }

            addBtn(33.5, 0, 35, "Appeler Ascenseur (RDC)", "call_0");
            addBtn(33.5, 25, 35, "Appeler Ascenseur (2ème)", "call_25");
            
            // Bouton interne qui voyage avec la cabine
            const cabBtn = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x2ecc71, emissive: 0x005500}));
            cabBtn.position.set(43, 3, 35); scene.add(cabBtn);
            interactableObjects.push({ mesh: cabBtn, baseY: 3, title: "Monter / Descendre", url: "#", actionType: "elevator", isCabBtn: true });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function onKeyDown( event ) {
            switch ( event.code ) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if ( canJump ) { velocity.y = 150; canJump = false; } // VRAI SAUT !
                    break;
                case 'KeyE': checkInteraction(); break;
            }
        }
        function onKeyUp( event ) {
            switch ( event.code ) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': case 'KeyQ': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function showNotif(msg, color) {
            notificationMsg.innerText = msg;
            notificationMsg.style.backgroundColor = color;
            notificationMsg.style.display = "block";
            setTimeout(() => notificationMsg.style.display = "none", 3000);
        }

        function checkInteraction() {
            if (closestObject && controls.isLocked) {
                if (closestObject.actionType === "elevator") {
                    elevatorData.targetY = elevatorData.targetY === 0 ? 25 : 0;
                    showNotif("Portes fermées. En route !", "#2ecc71");
                } else if (closestObject.actionType === "call_0") {
                    elevatorData.targetY = 0; showNotif("Ascenseur appelé au RDC...", "#e74c3c");
                } else if (closestObject.actionType === "call_25") {
                    elevatorData.targetY = 25; showNotif("Ascenseur appelé au 2ème...", "#e74c3c");
                } else if (closestObject.actionType === "link") {
                    controls.unlock();
                    window.location.href = closestObject.url;
                }
            }
        }

        function animate() {
            requestAnimationFrame( animate );
            const time = performance.now();
            let delta = ( time - prevTime ) / 1000;
            if ( delta > 0.05 ) delta = 0.05; // Sécurité anti-téléportation maximale
            prevTime = time;

            // Animation des objets
            interactableObjects.forEach((obj, idx) => {
                if(!obj.isCabBtn) {
                    obj.mesh.position.y = obj.baseY + Math.sin(time * 0.002 + idx) * 0.5;
                }
            });

            if ( controls.isLocked === true ) {
                // Frottement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize();

                const speed = 500.0;
                if ( moveForward || moveBackward ) velocity.z -= direction.z * speed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * speed * delta;

                const pos = controls.getObject().position;
                const oldX = pos.x;
                const oldZ = pos.z;

                controls.moveRight( - velocity.x * delta );
                controls.moveForward( - velocity.z * delta );

                const pr = 2.5; // Rayon du joueur
                const playerHeight = 10; 

                // --- GESTION DE L'ASCENSEUR ---
                if (Math.abs(elevatorPlatform.position.y - elevatorData.targetY) > 0.1) {
                    elevatorPlatform.position.y += (elevatorData.targetY > elevatorPlatform.position.y ? 1 : -1) * 10 * delta; 
                } else {
                    elevatorPlatform.position.y = elevatorData.targetY; 
                }
                elevatorData.y = elevatorPlatform.position.y;
                
                // Le bouton interne suit la cabine
                const cabBtn = interactableObjects.find(o => o.isCabBtn);
                if(cabBtn) { cabBtn.mesh.position.y = elevatorPlatform.position.y + 3; }

                // --- GRAVITÉ, SAUT & ESCALIERS PROPRES ---
                velocity.y -= 450.0 * delta; // Gravité puissante
                let projectedY = pos.y + velocity.y * delta;
                let feetY = projectedY - playerHeight;
                
                let groundY = -1000;
                let ceilingY = 1000;

                // Scanner tous les planchers pour trouver le sol et le plafond
                for (let f of floors) {
                    if (pos.x >= f.minX && pos.x <= f.maxX && pos.z >= f.minZ && pos.z <= f.maxZ) {
                        // Tolérance de "Step-Up" (monter les marches de 2 unités max d'un coup)
                        if (f.y <= pos.y - playerHeight + 2.0) {
                            if (f.y > groundY) groundY = f.y;
                        }
                        // Plafond (s'il est au-dessus de notre tête)
                        if (f.y > pos.y + 2) {
                            if (f.y < ceilingY) ceilingY = f.y;
                        }
                    }
                }

                // Vérifier si on est sur l'ascenseur
                if (pos.x >= elevatorData.x - elevatorData.w/2 && pos.x <= elevatorData.x + elevatorData.w/2 && 
                    pos.z >= elevatorData.z - elevatorData.d/2 && pos.z <= elevatorData.z + elevatorData.d/2) {
                    if (elevatorData.y <= pos.y - playerHeight + 2.0) {
                        if (elevatorData.y > groundY) groundY = elevatorData.y;
                    }
                }

                // Application de la physique verticale
                if (feetY <= groundY) {
                    // On a touché le sol (ou on monte une marche)
                    let targetPos = groundY + playerHeight;
                    // Lissage pour monter les escaliers joliment sans secousse violente
                    if (pos.y < targetPos - 0.1) {
                        pos.y += (targetPos - pos.y) * 0.4;
                    } else {
                        pos.y = targetPos;
                    }
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;
                } else if (projectedY + 2 >= ceilingY) {
                    // On s'est cogné la tête au plafond en sautant !
                    pos.y = ceilingY - 2;
                    if(velocity.y > 0) velocity.y = 0; 
                } else {
                    // On tombe ou on saute (dans les airs)
                    pos.y = projectedY;
                    canJump = false;
                }

                // --- COLLISIONS FLUIDES CONTRE LES MURS (Glissade) ---
                let collideX = false;
                for(let w of walls) {
                    // On vérifie si notre corps (sans les pieds) tape le mur
                    if (pos.y + 2 > w.minY && pos.y - (playerHeight - 0.5) < w.maxY) {
                        // Test X avec l'ancien Z
                        if (pos.x + pr > w.minX && pos.x - pr < w.maxX && oldZ + pr > w.minZ && oldZ - pr < w.maxZ) { collideX = true; break; }
                    }
                }
                if (collideX) pos.x = oldX;

                let collideZ = false;
                for(let w of walls) {
                    if (pos.y + 2 > w.minY && pos.y - (playerHeight - 0.5) < w.maxY) {
                        // Test Z avec le NOUVEAU X (permet de glisser)
                        if (pos.x + pr > w.minX && pos.x - pr < w.maxX && pos.z + pr > w.minZ && pos.z - pr < w.maxZ) { collideZ = true; break; }
                    }
                }
                if (collideZ) pos.z = oldZ;

                // --- SYSTÈME D'INTERACTION VISUELLE ---
                closestObject = null;
                let minDistance = interactionDistance;
                interactableObjects.forEach(obj => {
                    const dist = pos.distanceTo(obj.mesh.position);
                    if (dist < minDistance) { minDistance = dist; closestObject = obj; }
                });

                if (closestObject) {
                    interactionMsg.innerHTML = `Appuyez sur <b>'E'</b> pour : ${closestObject.title}`;
                    interactionMsg.style.display = 'block';
                } else {
                    interactionMsg.style.display = 'none';
                }
            }

            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
